<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MOMAH · Demand & Supply Optimizer (DSO)</title>
<link rel="icon" href="https://www.balady.gov.sa/themes/custom/balady_new/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B8354; --green-dark:#085D3A; --green-700:#12724a; --green-50:#ECFDF3; --green-100:#cdeede;
  --gold:#F8C630; --gold-50:#fef7e0; --teal-deep:#0b3b34;
  --bg:#f4f7f5; --card:#ffffff; --ink:#16211c; --muted:#5c6b63; --line:#e2eae5;
  --danger:#e32700; --danger-50:#fdeae6; --amber:#e29700; --amber-50:#fcf3dd; --success:#73b355; --info:#1763a6; --info-50:#e7f0f9;
  --radius:12px; --radius-sm:8px; --shadow:0 1px 2px rgba(16,33,28,.06),0 4px 16px rgba(16,33,28,.06);
  --sidebar-w:248px; --topbar-h:60px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:"IBM Plex Sans Arabic","PingFang SC","Microsoft YaHei",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
html[dir="rtl"] body{font-family:"IBM Plex Sans Arabic",system-ui,Arial,sans-serif}
#root{height:100%}
button,input,select,textarea{font-family:"IBM Plex Sans Arabic",inherit}
button{cursor:pointer}
a{color:inherit}
h1,h2,h3,h4{margin:0;font-weight:600;color:var(--ink)}
.muted{color:var(--muted)}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:var(--radius-sm);
  padding:9px 16px;font-size:14px;font-weight:600;background:var(--green);color:#fff;transition:.15s}
.btn:hover{background:var(--green-dark)}
.btn.secondary{background:#fff;color:var(--green);border-color:var(--green-100)}
.btn.secondary:hover{background:var(--green-50)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:#f0f4f1}
.btn.danger{background:#fff;color:var(--danger);border-color:var(--danger-50)}
.btn.danger:hover{background:var(--danger-50)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- chips / badges ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--green-50);color:var(--green-dark)}
.chip.gold{background:var(--gold-50);color:var(--gold)}
.chip.amber{background:var(--amber-50);color:var(--amber)}
.chip.danger{background:var(--danger-50);color:var(--danger)}
.chip.info{background:var(--info-50);color:var(--info)}
.chip.gray{background:#eef2ef;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.badge-count{background:var(--danger);color:#fff;border-radius:999px;min-width:18px;height:18px;padding:0 5px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px 18px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;inset-inline-start:0;top:12px;bottom:12px;width:4px;border-radius:0 3px 3px 0;background:var(--muted);opacity:.55}
.kpi-good::before{background:var(--green);opacity:1}
.kpi-bad::before{background:var(--danger);opacity:1}
.kpi-warn::before{background:var(--amber);opacity:1}
.kpi .label{font-size:13.5px;color:var(--muted);font-weight:700;letter-spacing:.01em}
.kpi .value{font-size:32px;font-weight:800;margin-top:10px;line-height:1.05;letter-spacing:-.5px}
.kpi .sub{font-size:13.5px;margin-top:10px;color:var(--muted);font-weight:700}
.grid{display:grid;gap:16px}

/* ---------- topbar ---------- */
.topbar{height:var(--topbar-h);background:#fff;color:var(--ink);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:40;
  border-bottom:3px solid var(--green);box-shadow:0 1px 8px rgba(16,33,28,.07)}
.topbar .brand{display:flex;align-items:center;gap:12px;font-weight:700}
.topbar .brand .topbar-logo{height:38px;width:auto;display:block;flex:0 0 auto}
.topbar .brand .topbar-sep{width:1px;height:30px;background:var(--line);display:inline-block}
.topbar .brand .topbar-app{font-weight:700;font-size:22px;color:var(--ink);line-height:1.1}
.topbar .right{display:flex;align-items:center;gap:8px}
.topbar .tbtn{background:#fff;border:1px solid var(--line);color:var(--ink);
  border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;font-weight:600;display:inline-flex;gap:6px;align-items:center}
.topbar .tbtn:hover{background:var(--green-50);border-color:var(--green-100);color:var(--green-dark)}
.usermenu{position:relative}
.usermenu .panel{position:absolute;top:46px;inset-inline-end:0;background:#fff;color:var(--ink);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);min-width:220px;padding:10px;z-index:50}

/* ---------- layout ---------- */
.shell{display:flex;min-height:calc(100% - var(--topbar-h))}
.sidebar{width:var(--sidebar-w);background:#fff;border-inline-end:1px solid var(--line);padding:16px 12px;flex:0 0 auto}
.sidebar .role{padding:10px 12px;border-radius:var(--radius-sm);background:var(--green-50);margin-bottom:14px}
.sidebar .role .nm{font-weight:700;color:var(--green-dark)}
.sidebar .role .rl{font-size:12px;color:var(--muted)}
.navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);
  color:var(--ink);font-weight:500;margin-bottom:2px;border:1px solid transparent}
.navitem:hover{background:#f0f4f1}
.navitem.active{background:var(--green-50);color:var(--green-dark);font-weight:600;border-color:var(--green-100)}
.navitem .ico{width:18px;text-align:center}
.content{flex:1 1 auto;padding:24px 28px;min-width:0}
.page-h{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.page-h h1{font-size:22px}
.page-h .sub{color:var(--muted);margin-top:4px;font-size:13.5px;max-width:760px}

/* ---------- tables ---------- */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th,table.tbl td{padding:10px 12px;text-align:start;border-bottom:1px solid var(--line)}
table.tbl thead th{background:#f3f7f4;color:var(--muted);font-weight:600;font-size:12px;white-space:nowrap}
table.tbl tbody tr:hover{background:#f8fbf9}
.expand-row td{background:#f8fbf9;border-bottom:1px solid var(--line)}

/* ---------- misc ---------- */
.progress{height:8px;border-radius:999px;background:#eef2ef;overflow:hidden}
.progress>span{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .55s ease}
.range{width:100%;accent-color:var(--green)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600}
.input{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;width:100%;background:#fff}
.input:focus{outline:2px solid var(--green-100);border-color:var(--green)}
.divider{height:1px;background:var(--line);margin:16px 0}
.banner{background:var(--gold-50);border:1px solid #ecdcae;color:#6b5210;border-radius:var(--radius-sm);padding:8px 14px;font-size:12.5px;display:flex;gap:8px;align-items:center}
.chain{display:flex;flex-direction:column;gap:8px}
.chain .node{position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fafcfb;transition:.25s}
.chain .node>*{position:relative;z-index:1}
.chain .node.run{border-color:#6d5ae6;background:#f1eefe}
.chain .node.run::before{content:"";position:absolute;inset:0;z-index:0;transform-origin:left;background:linear-gradient(90deg,rgba(109,90,230,.26),rgba(79,70,229,.10));animation:nodeFill .58s ease forwards}
[dir="rtl"] .chain .node.run::before{transform-origin:right}
@keyframes nodeFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.chain .node.done{border-color:var(--green-100);background:var(--green-50)}
.chain .node .st{font-size:12px;font-weight:700}
.timeline{position:relative;padding-inline-start:18px}
.timeline .ev{position:relative;padding:0 0 16px 0}
.timeline .ev::before{content:"";position:absolute;inset-inline-start:-18px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--green)}
.timeline .ev::after{content:"";position:absolute;inset-inline-start:-13.5px;top:14px;bottom:-2px;width:1px;background:var(--line)}
.timeline .ev:last-child::after{display:none}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef2ef;color:var(--muted)}
.login-wrap{min-height:100%;display:grid;place-items:center;background:
  radial-gradient(1200px 500px at 80% -10%, var(--green-50), transparent),
  radial-gradient(900px 500px at -10% 110%, var(--gold-50), transparent), var(--bg);padding:24px}
.login-card{width:420px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px}
.role-pick{display:flex;flex-direction:column;gap:10px;margin:8px 0 4px}
.role-opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:start;background:#fff;width:100%}
.role-opt:hover{border-color:var(--green);background:var(--green-50)}
.role-opt.sel{border-color:var(--green);background:var(--green-50);box-shadow:0 0 0 2px var(--green-100)}
.role-opt .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;background:var(--green-100);color:var(--green-dark);flex:0 0 auto}
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cols-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}}
@media(max-width:820px){.cols-2{grid-template-columns:1fr}.sidebar{display:none}}
.right-num{text-align:end}
.scrollx{overflow-x:auto}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---- Balady-style polish: icons, buttons, card accent, active nav ---- */
.ic-svg{width:16px;height:16px;display:inline-block;vertical-align:-3px;flex:0 0 auto}
[dir="rtl"] .ic-arrow{transform:scaleX(-1)}
.btn .ic-svg{width:15px;height:15px;vertical-align:-2px}
.tbtn .ic-svg{width:15px;height:15px}
.tbtn .ic-lang{width:16px;height:16px;display:inline-block;vertical-align:-3px}
.bld-lang2 .ic-svg{width:15px;height:15px;color:inherit}
/* content cards get a thin green top accent (Balady service-card style) */
.card.acc{border-top:3px solid var(--green);border-top-left-radius:var(--radius);border-top-right-radius:var(--radius)}
/* active sidebar item: green leading bar */
.navitem{position:relative}
.navitem.active::before{content:"";position:absolute;inset-inline-start:0;top:7px;bottom:7px;width:3px;background:var(--green);border-radius:0 2px 2px 0}
[dir="rtl"] .navitem.active::before{border-radius:2px 0 0 2px}
/* secondary buttons: white / green outline with inner icon (Balady "Details") */
.btn.secondary{display:inline-flex;align-items:center;gap:6px}
.btn.sm{display:inline-flex;align-items:center;gap:6px}

/* ---- Balady-style service cards ---- */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1100px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.svc-grid{grid-template-columns:1fr}}
.svc-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s,border-color .16s}
.svc-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(16,33,28,.12);border-color:var(--green-100)}
.svc-ic{width:46px;height:46px;border-radius:12px;background:var(--green-50);color:var(--green-dark);display:grid;place-items:center;font-size:22px;margin-bottom:4px}
.svc-title{font-weight:700;font-size:15px}
.svc-cat{font-size:12px;color:var(--muted)}
.svc-tags{list-style:none;margin:6px 0 12px;padding:0;display:flex;flex-direction:column;gap:5px}
.svc-tags li{font-size:12.5px;color:#3a4a42;position:relative;padding-inline-start:18px}
.svc-tags li::before{content:"\2713";position:absolute;inset-inline-start:0;color:var(--green);font-weight:800}
.svc-actions{margin-top:auto;display:flex;gap:8px;padding-top:4px}
.svc-actions .btn{flex:1;justify-content:center}

/* ---- Data Readiness: refresh flash ---- */
.flash-sources .card{animation:srcflash 1.3s ease}
@keyframes srcflash{0%{background:#eafaf0;box-shadow:0 0 0 0 rgba(27,131,84,0)}22%{box-shadow:0 0 0 3px rgba(27,131,84,.22)}100%{background:#fff;box-shadow:var(--shadow)}}

/* ---- What-if: AI orchestration animation ---- */
.ai-scan{height:3px;border-radius:2px;background:var(--green-50);overflow:hidden;position:relative;margin-bottom:8px}
.ai-scan span{position:absolute;top:0;bottom:0;left:0;width:38%;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:aiscan 1s linear infinite}
@keyframes aiscan{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
.ai-working{font-size:12.5px;color:#6d5ae6;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;animation:aipulse 1.2s ease infinite}
@keyframes aipulse{0%,100%{opacity:.55}50%{opacity:1}}
.ai-eval{display:flex;flex-direction:column;gap:10px;margin-top:18px;padding:16px 17px 15px;min-height:118px;border-radius:14px;background:linear-gradient(180deg,#f6f4ff,#f1eefe);border:1px solid #e4dcfb;border-inline-start:4px solid #6d5ae6;box-shadow:inset 0 1px 0 rgba(255,255,255,.6);animation:fadeIn .4s ease}
.ai-eval-top{display:flex;align-items:center;gap:9px}
.ai-eval-ic{width:34px;height:34px;border-radius:50%;background:linear-gradient(120deg,#4f46e5 0%,#6d5ae6 45%,#2563eb 100%);color:#fff;display:grid;place-items:center;font-size:17px;flex:0 0 auto;border:1px solid rgba(255,255,255,.25);box-shadow:0 2px 9px rgba(79,70,229,.4);animation:aiGlow 2.4s ease-in-out infinite}
@keyframes aiGlow{0%,100%{box-shadow:0 2px 9px rgba(79,70,229,.4)}50%{box-shadow:0 2px 16px rgba(79,70,229,.7)}}
.ai-eval-h{font-weight:700;font-size:15px;letter-spacing:.01em;background:linear-gradient(120deg,#4f46e5,#6d5ae6 50%,#2563eb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ai-eval-t{font-size:14.5px;line-height:1.7;color:#5a4ad1;font-weight:700}
.ai-eval.good .ai-eval-t{color:var(--green-dark)}
.ai-eval.warn .ai-eval-t{color:#9a6a06}
.dr-funnel{display:flex;flex-direction:column;align-items:center;margin:0 0 8px}
.dr-funnel-svg{display:block}
.fnl-arrow{animation:fnlPulse 1.6s ease-in-out infinite}
@keyframes fnlPulse{0%,100%{opacity:.7}50%{opacity:1}}
.dr-funnel-cap{font-size:11.5px;font-weight:700;color:var(--green-dark);margin-top:1px;letter-spacing:.01em}
.src-group{border:1px solid var(--green-100);border-radius:14px;padding:14px;background:linear-gradient(180deg,#f7fbf9,#f3f9f5)}
.src-group-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.src-group-head strong{font-size:14px}
.btn-ai{background:linear-gradient(125deg,#4f46e5,#2563eb);border-color:transparent;color:#fff}
.btn-ai:hover{background:linear-gradient(125deg,#4f46e5,#2563eb);filter:brightness(1.08)}
.lever-card{display:flex;flex-direction:column}
.lever-card .ai-eval{flex:1 1 auto}
.lever-flash .range{animation:leverPulse 1s ease}
.lever-flash label .mono{animation:leverNum 1s ease}
@keyframes leverPulse{0%{box-shadow:0 0 0 0 rgba(27,131,84,0)}30%{box-shadow:0 0 0 4px rgba(27,131,84,.18)}100%{box-shadow:0 0 0 0 rgba(27,131,84,0)}}
@keyframes leverNum{0%,100%{color:inherit}25%{color:var(--green);transform:scale(1.18)}}
.ai-eval-btn{align-self:flex-start;margin-top:auto;padding:8px 15px;font-size:13.5px;font-weight:600;color:#fff;background:linear-gradient(125deg,#4f46e5,#2563eb);border:none;border-radius:8px;cursor:pointer;transition:filter .15s ease,transform .1s ease}
.ai-eval-btn:hover{filter:brightness(1.07)}
.ai-eval-btn:active{transform:translateY(1px)}
.ai-eval-btn:disabled{opacity:.5;cursor:default}
.ai-eval.good .ai-eval-btn{background:linear-gradient(125deg,var(--green),var(--green-dark))}
.ai-eval.warn .ai-eval-btn{background:linear-gradient(125deg,#f0a91e,#d98512)}
.chain .node.run{animation:nodeglow 1s ease infinite, nodefloat 1.8s ease-in-out infinite}
@keyframes nodeglow{0%,100%{box-shadow:0 0 0 0 rgba(109,90,230,0)}50%{box-shadow:0 0 0 4px rgba(109,90,230,.18)}}
@keyframes nodefloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.node-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.node-metric{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);white-space:nowrap}
.node-metric .ml{opacity:.85}
.chain-metric{color:var(--green-dark);font-weight:700;min-width:62px;text-align:end;display:inline-block}
.pfield{width:100%;height:170px;display:block;margin-bottom:10px;border-radius:12px;border:1px solid var(--green-100);
  background:radial-gradient(120% 120% at 50% 120%, #eafaf0, #f6fbf8)}

/* ---- Data Readiness: run-button particle burst, page shake, breathing skeleton ---- */
.btn-burst-wrap{position:relative;display:inline-block}
.burst{position:absolute;inset-inline-start:50%;top:50%;width:0;height:0;pointer-events:none;z-index:5}
.burst i{position:absolute;left:0;top:0;width:6px;height:6px;margin:-3px;border-radius:50%;background:var(--green);opacity:.9;animation:burst 1.1s ease-out forwards;animation-delay:var(--d)}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:.9}70%{opacity:.65}100%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0}}
.page-shake{animation:pageshake .42s ease}
@keyframes pageshake{0%,100%{transform:translateX(0)}15%{transform:translateX(-.5px)}35%{transform:translateX(.5px)}55%{transform:translateX(-.5px)}75%{transform:translateX(.5px)}90%{transform:translateX(-.3px)}}
.skel-area{overflow:hidden;animation:skelexpand .42s ease;margin-bottom:16px}
@keyframes skelexpand{from{max-height:0;opacity:0}to{max-height:340px;opacity:1}}
.skel-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px}
.skel-bar{height:12px;border-radius:6px;background:linear-gradient(90deg,#eef2ef,#dfeee6,#eef2ef);background-size:200% 100%;animation:skelbreathe 1.5s ease-in-out infinite}
.skel-bar.w50{width:50%}.skel-bar.w85{width:85%}.skel-bar.w65{width:65%}.skel-bar.w40{width:40%}
@keyframes skelbreathe{0%,100%{opacity:.45;background-position:0 0}50%{opacity:1;background-position:100% 0}}
.flash-kpis .kpi{animation:kpiflash 1s ease}
@keyframes kpiflash{0%{box-shadow:0 0 0 0 rgba(27,131,84,0)}20%{box-shadow:0 0 0 3px rgba(27,131,84,.28)}100%{box-shadow:var(--shadow)}}
.flash-kpis .kpi .value{animation:kpipop .55s ease}
@keyframes kpipop{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}

/* ---- added: data-readiness key/value, to-do rows, prominent alert, work-order, package detail ---- */
.kv{display:flex;flex-direction:column;gap:5px;font-size:12.5px}
.kv-row{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.av.sm{width:30px;height:30px;font-size:14px}
.todo-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid var(--line);border-radius:8px;transition:background .15s}
.todo-row:hover{background:var(--green-50)}
.todo-row:last-child{border-bottom:none}
.alert-strong{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 18px;border-radius:12px;
  background:linear-gradient(0deg,var(--danger-50),var(--danger-50));border:1px solid #f0b4ad;border-inline-start:6px solid var(--danger);
  box-shadow:0 2px 10px rgba(179,38,30,.12)}
.alert-ico{font-size:26px;line-height:1}
.alert-title{font-weight:700;color:var(--danger);font-size:15px}
.alert-body{font-size:13px;color:#7a241d;margin-top:2px}
.alert-pill{background:var(--danger);color:#fff;font-weight:700;font-size:11px;padding:4px 12px;border-radius:999px;letter-spacing:.04em}
.wo{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;font-size:12px;background:#eef2ef;color:var(--ink);padding:2px 8px;border-radius:6px}
.wo-btn{cursor:pointer;background:var(--green-50);color:var(--green-dark);border:1px solid var(--green-100);
  display:inline-flex;align-items:center;gap:5px;transition:background .15s,color .15s,box-shadow .15s,transform .1s}
.wo-btn:hover{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(27,131,84,.28)}
.wo-btn:active{transform:translateY(1px)}
.wo-ico{width:13px;height:13px;flex:0 0 auto;opacity:.9}
.modal-ov{position:fixed;inset:0;background:rgba(16,33,28,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.32);width:540px;max-width:100%;max-height:86vh;overflow:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0;z-index:1}
.modal-head h3{font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:8px;line-height:1}
.modal-x:hover{background:#f0f4f1;color:var(--ink)}
.modal-body{padding:20px}
.pkg-detail{margin-top:12px;padding:12px 14px;background:#f8fbf9;border:1px solid var(--line);border-radius:10px}
.leak-card{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;background:#fff}
.brief-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:15px 16px}
.brief-card .bh{font-size:13px;font-weight:700;margin-bottom:8px}
.brief-card .bv{font-size:21px;font-weight:800;color:var(--green-dark);line-height:1.1}
.brief-card .bs{font-size:12px;margin-top:5px}
.agent-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#fff;background:linear-gradient(120deg,#4f46e5 0%,#6d5ae6 45%,#2563eb 100%);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:4px 11px;white-space:nowrap;box-shadow:0 2px 8px rgba(79,70,229,.28)}
.agent-badge .ic-gear{filter:brightness(0) invert(1);animation:gearspin 8s linear infinite}
@keyframes gearspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ic-gear{width:15px;height:15px;flex:0 0 auto}
.sect-right{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
.tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1px solid var(--green-100);color:var(--green-dark);font-size:11px;font-weight:800;cursor:help;background:var(--green-50);flex:0 0 auto}
.tip .tip-pop{position:absolute;top:140%;inset-inline-start:0;width:260px;max-width:62vw;background:#16211c;color:#fff;font-size:12px;font-weight:400;line-height:1.55;padding:9px 11px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.28);opacity:0;visibility:hidden;transition:opacity .15s;z-index:60;text-align:start}
.tip:hover .tip-pop,.tip:focus .tip-pop{opacity:1;visibility:visible}
.notif-badge{position:absolute;top:-5px;inset-inline-end:-5px;background:var(--danger);color:#fff;border-radius:999px;min-width:16px;height:16px;padding:0 4px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.notif-row{display:flex;gap:10px;padding:9px 8px;border-top:1px solid var(--line)}
.notif-row:hover{background:#f8fbf9}
.dr-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:1100px){.dr-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.dr-strip{grid-template-columns:repeat(2,1fr)}}
.mini-kpi{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.mini-kpi .v{font-weight:700;font-size:16px;margin-top:2px}
.mini-kpi>.muted{font-weight:700;color:#46544c}
.dropzone{border:2px dashed var(--green-100);border-radius:12px;padding:28px 20px;text-align:center;background:var(--green-50);cursor:pointer;color:var(--green-dark);transition:border-color .15s,background .15s}
.dropzone:hover,.dropzone.over{border-color:var(--green);background:#eafaf0}
.dropzone .di{font-size:30px;margin-bottom:8px;line-height:1}

/* ---- Balady SSO login (matched to reference layout) ---- */
.bld-login{position:relative;height:100%;min-height:100%;overflow:hidden;color:#161616}
.bld-bg{position:absolute;inset:0;z-index:0}
.bld-bg svg{width:100%;height:100%;display:block}
.bld-photo{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover}
.bld-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(10,50,55,.50) 0%,rgba(10,50,55,.30) 50%,rgba(8,40,45,.62) 100%)}
.bld-logo-img{height:54px;width:auto;display:block;flex:0 0 auto}
.bld-logo-cap{color:#fff;font-weight:700;font-size:22px;line-height:1.3;max-width:360px}
.bld-center{position:relative;z-index:3;height:100%;display:flex;align-items:center;justify-content:center;padding:24px 15px}
.bld-wrap{width:100%;max-width:1200px}
.bld-row2{display:flex;align-items:center;justify-content:space-between;gap:2rem}
.bld-brand-area{flex:0 0 55%;max-width:55%;color:#fff}
.bld-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.bld-logo .circle{width:60px;height:60px;border-radius:50%;background:var(--green);border:2px solid #fff;display:grid;place-items:center;color:#fff;font-size:26px;font-weight:800;flex:0 0 auto}
.bld-logo .ar{display:block;font-weight:600;font-size:14px;line-height:1.3}
.bld-logo .en{opacity:.85;font-size:11px}
.bld-brand-area h3{font-size:46px;font-weight:700;line-height:1.25;letter-spacing:-1px;margin:0 0 16px}
.bld-brand-area p{font-size:18px;line-height:1.6;margin:0;max-width:480px;opacity:.95}
.bld-card-col{flex:0 0 45%;max-width:45%;display:flex;justify-content:center}
.bld-card{width:100%;max-width:526px;background:#fff;border-radius:16px;box-shadow:0 3px 22px rgba(0,0,0,.25);padding:40px 36px}
.bld-card h2{font-size:22px;font-weight:700;text-align:center;margin:0 0 28px}
.bld-fg{margin-bottom:18px;text-align:start}
.bld-fg label{display:block;font-size:14px;color:#161616;margin-bottom:6px}
.bld-inp{position:relative}
.bld-inp .ic{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#707070;pointer-events:none}
.bld-inp .eye{position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#707070;cursor:pointer;user-select:none}
.bld-inp input,.bld-inp select{width:100%;height:40px;border:1px solid #9DA4AE;border-radius:4px;background:#fff;padding:0 12px;padding-inline-start:38px;font-size:14px;color:#161616;font-family:inherit;outline:none;transition:border-color .15s}
.bld-inp.has-eye input{padding-inline-end:38px}
.bld-inp select{appearance:none;-webkit-appearance:none;padding-inline-end:34px;cursor:pointer}
.bld-inp input:focus,.bld-inp select:focus{border-color:#9DA4AE;border-bottom:2px solid #161616}
.bld-inp .caret{position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);color:var(--green-dark);pointer-events:none;font-size:18px;font-weight:700;line-height:1}
.bld-inp select{padding-inline-end:40px}
.bld-hint{font-size:12px;color:#707070;margin:-10px 0 14px}
.bld-captcha{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.bld-code{background:#e5e7eb;border-radius:4px;min-width:120px;height:40px;display:flex;align-items:center;justify-content:center}
.bld-code span{font-family:"Courier New",monospace;font-size:18px;letter-spacing:4px;color:#161616;font-weight:600;user-select:none}
.bld-refresh{color:var(--green);font-size:18px;cursor:pointer;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:none;border:none}
.bld-captcha input{flex:1;height:40px;border:1px solid #9DA4AE;border-radius:4px;background:#fff;padding:0 12px;font-size:14px;text-align:center;letter-spacing:3px;font-family:"Courier New",monospace;outline:none}
.bld-captcha input:focus{border-bottom:2px solid #161616}
.bld-btn{width:100%;height:40px;border:none;border-radius:4px;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.bld-btn:hover{background:#146B43}
.bld-or{display:flex;align-items:center;gap:12px;color:#707070;font-size:13px;margin:18px 0}
.bld-or::before,.bld-or::after{content:"";flex:1;height:1px;background:#d1d5db}
.bld-nic{width:100%;max-width:404px;height:72px;border:1px solid #384250;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;gap:14px;cursor:pointer;margin:0 auto 16px}
.bld-nic:hover{background:#f9fafb}
.bld-nic-grid{display:grid;grid-template-columns:repeat(3,10px);grid-template-rows:repeat(3,10px);gap:2px}
.bld-nic-grid i{width:10px;height:10px;border-radius:1px;display:block}
.bld-nic-grid .g{background:var(--green)}.bld-nic-grid .k{background:#1a1a1a}.bld-nic-grid .o{background:#e07c3e}
.bld-nic .l1{font-size:22px;font-weight:700;color:#161616;line-height:1.1;text-align:start}
.bld-nic .l2{font-size:11px;color:#707070;line-height:1.3;text-align:start}
.bld-create{text-align:center;font-size:13px;color:#707070;margin-top:4px}
.bld-create button{color:var(--green);font-weight:600;background:none;border:none;cursor:pointer;font-size:13px;padding:0}
.bld-create button:hover{text-decoration:underline}
.bld-langrow{display:flex;justify-content:flex-end;margin-top:14px}
.bld-lang2{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#707070;cursor:pointer;background:none;border:none;padding:4px 8px}
.bld-lang2:hover{color:var(--green)}
.bld-copy{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,.7);font-size:12px;z-index:3;padding:0 12px}
@media(max-width:820px){.bld-row2{flex-direction:column;gap:1rem}.bld-brand-area{display:none}.bld-card-col{flex:none;max-width:100%}.bld-card{max-width:460px;padding:32px 24px}}

/* =========================================================================
   DSO additions — coverage switch, engine grid, J1 chat, J2 monitoring,
   J3 scenarios, journey cards, agent activity log.
   ========================================================================= */
/* shell gets a bottom agent-log bar (30px) — reserve space so nothing hides under it */
.content{padding-bottom:46px}

/* coverage-mode segmented control in topbar */
.cov{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
.cov button{border:none;background:transparent;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--muted);line-height:1}
.cov button.on{background:var(--green);color:#fff}
.cov button:not(.on):hover{background:var(--green-50);color:var(--green-dark)}

/* engine status cards (Hub) */
.eng-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1300px){.eng-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1100px){.eng-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.eng-grid{grid-template-columns:1fr}}
.eng{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.eng.orch{border-color:#c9c0f7;background:linear-gradient(180deg,#f7f5ff,#fff)}
.eng .et{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
.eng .ed{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.45}
.eng .es{margin-top:9px;display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--green-dark)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(27,131,84,.5);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(27,131,84,.5)}70%{box-shadow:0 0 0 7px rgba(27,131,84,0)}100%{box-shadow:0 0 0 0 rgba(27,131,84,0)}}

/* 11-source mini health strip */
.src11{display:grid;grid-template-columns:repeat(11,1fr);gap:7px}
@media(max-width:900px){.src11{grid-template-columns:repeat(6,1fr)}}
@media(max-width:560px){.src11{grid-template-columns:repeat(4,1fr)}}
.src11 .s{border:1px solid var(--line);border-radius:9px;padding:8px 6px;text-align:center;background:#fff;cursor:default;transition:transform .12s}
.src11 .s:hover{transform:translateY(-2px)}
.src11 .s .sk{font-size:10.5px;font-weight:700;letter-spacing:.02em}
.src11 .s .sd{width:9px;height:9px;border-radius:50%;margin:6px auto 0}

/* journey entry cards */
.jcard{display:flex;flex-direction:column;gap:7px;cursor:pointer}
.jcard .jh{display:flex;align-items:center;gap:9px}
.jcard .jn{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:13px;flex:0 0 auto}
.jcard .jbody{font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
.jcard .jgo{font-size:12.5px;font-weight:700;color:var(--green-dark);display:inline-flex;align-items:center;gap:5px}

/* J1 chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--topbar-h) - 268px);min-height:340px}
.chat-scroll{flex:1;overflow-y:auto;padding:6px 4px 12px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:88%;animation:fade .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:14px;flex:0 0 auto;color:#fff}
.msg.user .av{background:var(--green-dark)}
.msg.bot .av{background:linear-gradient(120deg,#4f46e5,#2563eb)}
.bubble{background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 14px;font-size:13.5px;line-height:1.6;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--green-50);border-color:var(--green-100)}
.bubble h5{font-size:13px;margin:0 0 6px;color:var(--ink)}
.bubble .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.think{display:flex;flex-direction:column;gap:6px;margin:2px 0}
.think .tl{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.think .tl.act{color:#5a4ad1;font-weight:700}
.think .tl.ok{color:var(--green-dark)}
.think .tl .ti{width:16px;text-align:center}
.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input .input{flex:1}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.preset{font-size:12px;border:1px solid var(--green-100);background:var(--green-50);color:var(--green-dark);border-radius:999px;padding:6px 12px;font-weight:600}
.preset:hover{background:var(--green);color:#fff;border-color:var(--green)}
.preset.alt{border-color:#d9d3f7;background:#f1eefe;color:#5a4ad1}
.preset.alt:hover{background:#6d5ae6;color:#fff;border-color:#6d5ae6}
.report-card{border:1px solid var(--green-100);border-radius:12px;overflow:hidden;margin-top:6px;background:#fff}
.report-card .rch{background:linear-gradient(120deg,var(--green-dark),var(--green));color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.report-card .rch .rt{font-weight:700;font-size:13.5px}
.report-card .rcb{padding:13px 14px}
.report-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px dashed var(--line)}
.report-row:last-child{border-bottom:none}

/* J2 monitoring */
.mon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1100px){.mon-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.mon-grid{grid-template-columns:1fr}}
.mon{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;box-shadow:var(--shadow)}
.mon.red{border-color:#f0b4ad;background:linear-gradient(180deg,#fdf2f0,#fff)}
.mon.amber{border-color:#ecdcae;background:linear-gradient(180deg,#fdf8ec,#fff)}
.mon .mh{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:7px}
.mon .mname{font-weight:700;font-size:12.5px}
.scan-bar{height:4px;border-radius:2px;background:var(--green-50);overflow:hidden;position:relative}
.scan-bar span{position:absolute;top:0;bottom:0;left:0;width:34%;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:aiscan 1.05s linear infinite}

/* J3 scenarios */
.scn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:820px){.scn-grid{grid-template-columns:1fr}}
.scn{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;box-shadow:var(--shadow)}
.scn.base{border-color:var(--green-100)}
.scn.opt{border-color:#bfe3cf}
.scn.pess{border-color:#f0c9a8}
.scn .sct{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:9px}
.scn .scrow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.reco{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fafcfb}
.reco .rk{width:24px;height:24px;border-radius:6px;background:var(--green-50);color:var(--green-dark);display:grid;place-items:center;font-weight:800;font-size:12px;flex:0 0 auto}

/* ecosystem map */
.eco{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:8px 0}
.eco .node-box{border:1px solid var(--line);border-radius:12px;padding:12px 16px;text-align:center;background:#fff;min-width:140px;box-shadow:var(--shadow)}
.eco .node-box.dso{border-color:var(--green);background:var(--green-50)}
.eco .node-box.flash{animation:ecoflash 1.1s ease}
@keyframes ecoflash{0%{box-shadow:0 0 0 0 rgba(27,131,84,0)}30%{box-shadow:0 0 0 5px rgba(27,131,84,.22)}100%{box-shadow:var(--shadow)}}
.eco .arrow{font-size:20px;color:var(--green);font-weight:800}
[dir="rtl"] .eco .arrow{transform:scaleX(-1)}

/* global agent activity log (bottom bar) */
.agentlog{position:fixed;bottom:0;inset-inline-start:var(--sidebar-w);inset-inline-end:0;height:30px;background:#0b3b34;color:#cfeee0;
  display:flex;align-items:center;gap:10px;padding:0 16px;font-size:11.5px;z-index:35;overflow:hidden;font-variant-numeric:tabular-nums}
@media(max-width:820px){.agentlog{inset-inline-start:0}}
.agentlog .alh{font-weight:700;color:#7fe0b3;white-space:nowrap;display:flex;align-items:center;gap:6px}
.agentlog .alline{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.92;animation:fade .4s ease}
.agentlog .alline b{color:#9ad9ff;font-weight:700}
.live-dot{width:7px;height:7px;border-radius:50%;background:#46d39a;animation:pulse 1.6s infinite}

/* ---- briefing storyline additions ---- */
/* shock banner */
.shock{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:13px 18px;border-radius:12px;
  background:linear-gradient(0deg,var(--danger-50),var(--danger-50));border:1px solid #f0b4ad;border-inline-start:6px solid var(--danger);box-shadow:0 2px 10px rgba(179,38,30,.12)}
.shock .si{font-size:24px;line-height:1}
.shock .stxt{flex:1;font-size:13px;color:#7a241d;font-weight:600}
.shock .spill{background:var(--danger);color:#fff;font-weight:700;font-size:11px;padding:4px 12px;border-radius:999px;letter-spacing:.04em;white-space:nowrap}

/* econ scenario + generic mini tables already styled by .tbl */
.econ-cell{font-weight:700}
.prob-bar{height:6px;border-radius:999px;background:#eef2ef;overflow:hidden;margin-top:5px}
.prob-bar>span{display:block;height:100%;background:var(--green)}

/* gap heatmap */
.heat{border-collapse:separate;border-spacing:4px;width:100%}
.heat th{font-size:11.5px;color:var(--muted);font-weight:700;padding:4px 6px;text-align:center}
.heat td.rh{font-size:12px;font-weight:700;text-align:start;color:var(--ink);white-space:nowrap;padding-inline-end:8px}
.heat td.cell{text-align:center;border-radius:8px;font-size:12px;font-weight:700;padding:12px 6px;color:#fff;min-width:64px}
.heat-legend{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);margin-top:10px}
.heat-scale{height:10px;width:120px;border-radius:5px;background:linear-gradient(90deg,#c0392b,#e29700,#f4f7f5,#73b355,#1B8354)}

/* developer scorecard */
.dev-grade{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:7px;font-weight:800;font-size:12px;color:#fff}
.dev-grade.A{background:var(--green)}.dev-grade.B{background:var(--amber)}.dev-grade.C{background:#9aa3ab}
.bar-mini{height:7px;border-radius:999px;background:#eef2ef;overflow:hidden;min-width:60px}
.bar-mini>span{display:block;height:100%;background:var(--green)}

/* policy A vs B */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.ab-grid{grid-template-columns:1fr}}
.ab{border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff;box-shadow:var(--shadow)}
.ab.good{border-color:var(--green-100);background:linear-gradient(180deg,#f3fbf6,#fff)}
.ab.bad{border-color:#f0b4ad;background:linear-gradient(180deg,#fdf2f0,#fff)}
.ab .abh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.ab .abt{font-weight:700;font-size:13.5px}
.ab .abrow{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--line)}
.ab .abrow:last-child{border-bottom:none}
.ab .abv{font-weight:700;font-variant-numeric:tabular-nums}

/* ranked recommendations */
.rec{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fff}
.rec .rp{font-size:10px;font-weight:800;color:#fff;border-radius:6px;padding:3px 8px;white-space:nowrap;letter-spacing:.03em;margin-top:1px}
.rec .rp.immediate{background:var(--danger)}.rec .rp.high{background:var(--amber)}.rec .rp.medium{background:#1763a6}
.rec .rbody{flex:1;font-size:13px}
.rec .rmeta{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}
.rec .rmeta b{color:var(--green-dark)}

/* briefing-style report card */
.report-card.brief .rch{background:linear-gradient(120deg,#0b3b34,#13796a)}
.brief-tag{display:inline-block;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:5px;padding:2px 8px;letter-spacing:.04em;margin-bottom:6px}

/* ---- J3 policy simulation engine ---- */
// levers: financing (Δ financing ratio %), whiteland (Δ white-land fee %), subsidy (Δ subsidy %)
function computePolicy(lv){
  const f = lv.financing/100, w = lv.whiteland/100, s = lv.subsidy/100;
  // base sensitivities (demo): demand up with financing & subsidy; supply up with white-land fee; gap = demand-supply pressure
  const base = {
    demand: +(f*42 + s*30 - w*4).toFixed(1),
    supply: +(w*26 + f*6).toFixed(1),
    price:  +(f*9 + s*5 - w*7).toFixed(1),
  };
  base.gap = +(base.demand - base.supply).toFixed(1);
  const span = (k,d)=>({ demand:+(k.demand*d).toFixed(1), supply:+(k.supply*d).toFixed(1), price:+(k.price*d).toFixed(1), gap:+((k.demand*d)-(k.supply*d)).toFixed(1) });
  return { opt: span(base,1.28), base, pess: span(base,0.72) };
}

function ChatAnalysis(){
  const {t,cov,setRoute,pushLog,addReport,seed,clearSeed}=useStore();
  const [msgs,setMsgs]=useState([]);
  const [busy,setBusy]=useState(false);
  const [input,setInput]=useState("");
  const scrollRef=useRef(null);
  const idRef=useRef(0);
  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[msgs,busy]);

  function push(m){ idRef.current+=1; const id=idRef.current; setMsgs(prev=>[...prev,{id,...m}]); return id; }
  function run(scnId){
    if(busy) return;
    const scn=SCN[scnId]; if(!scn) return;
    push({role:"user",text:t(scnId)});
    if(scn.type==="handoff"){ pushLog("log_policy"); setTimeout(()=>setRoute("policy"),500);
      push({role:"bot",type:"text",text:t("a_demand")? "↪ "+t("nav_policy") : ""}); return; }
    setBusy(true);
    pushLog(scn.type==="cross"?"log_cross":scn.type==="escalate"?"log_route":"log_route");
    const thinkId=push({role:"bot",type:"think",scn:scnId,steps:scn.steps.map(s=>({eng:s[0],k:s[1],st:"idle"})),i:0});
    let i=0;
    const tick=()=>{
      setMsgs(prev=>prev.map(m=>{ if(m.id!==thinkId) return m;
        const steps=m.steps.map((s,idx)=> idx<i?{...s,st:"ok"}: idx===i?{...s,st:"run"}:s ); return {...m,steps}; }));
      i+=1;
      if(i<=scn.steps.length){ setTimeout(tick,640); }
      else {
        setMsgs(prev=>prev.map(m=> m.id===thinkId?{...m,steps:m.steps.map(s=>({...s,st:"ok"}))}:m));
        setBusy(false);
        if(scn.type==="escalate"){ push({role:"bot",type:"escalate",scn:scnId}); }
        else { push({role:"bot",type:"answer",scn:scnId}); if(scn.report){ pushLog("log_route"); } }
      }
    };
    setTimeout(tick,500);
  }
  function genReport(scnId){
    const scn=SCN[scnId]; const ref=refNo();
    addReport({ ref, nameKey:scn.report, cov, conf:scn.conf });
    push({role:"bot",type:"report",scn:scnId,ref});
    pushLog("log_report",ref);
  }
  function freeSend(){
    const q=input.trim().toLowerCase(); setInput("");
    if(!q) return;
    let id="q_vague";
    if(/rate|interest|bps|利率|加息|فائدة|shock|冲击/.test(q)) id="q_shock";
    else if(/gap|缺口|فجوة|supply|供给|عرض/.test(q)) id="q_gap";
    else if(/demand|趋势|需求|طلب|trend|segment|客群|段/.test(q)) id="q_demand";
    else if(/financ|融资|政策|policy|تمويل|سياسة/.test(q)) id="q_policy";
    else { push({role:"user",text:input||q}); push({role:"bot",type:"text",text:t("a_vague")}); return; }
    run(id);
  }
  useEffect(()=>{ if(seed){ run(seed); clearSeed(); } /* eslint-disable-next-line */ },[seed]);

  const presets=["q_shock","q_demand","q_gap","q_vague"];
  return (<div className="fade">
    <PageHeader title={t("nav_chat")} sub={t("chat_sub")} right={<AgentBadge name={t("eng_orch")}/>}/>
    <div className="card pad" style={{display:"flex",flexDirection:"column"}}>
      <div className="preset-row">
        <span className="muted" style={{fontSize:12,fontWeight:700,alignSelf:"center"}}>{t("presets")}</span>
        {presets.map(p=><button key={p} className={"preset"+(p==="q_vague"?" alt":"")} onClick={()=>run(p)} disabled={busy}>{t(p).length>42?t(p).slice(0,40)+"…":t(p)}</button>)}
      </div>
      <div className="chat-wrap">
        <div className="chat-scroll" ref={scrollRef}>
          {msgs.length===0&&<div className="muted" style={{textAlign:"center",margin:"30px 0",fontSize:13}}>✦ {t("chat_sub")}</div>}
          {msgs.map(m=><Msg key={m.id} m={m} onGenReport={genReport} onRoute={setRoute} onRun={run}/>)}
        </div>
        <div className="chat-input">
          <input className="input" placeholder={t("chat_ph")} value={input} disabled={busy}
            onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")freeSend();}}/>
          <button className="btn" onClick={freeSend} disabled={busy}>{busy?t("running"):t("send")}</button>
        </div>
      </div>
    </div>
  </div>);
}

function PolicySim(){

function Developers(){
  const {t}=useStore(); const C=RC; const ok=!!C.ResponsiveContainer;
  const radar=DEV_DIMS.map(d=>{ const row={dim:t("d_"+d)}; DEVS.slice(0,5).forEach(dv=>row[dv.name]=dv[d]); return row; });
  const RADC=["#1B8354","#2563eb","#6d5ae6","#e29700","#9aa3ab"];
  const tiers=[["t1","immediate"],["t2","high"],["t3","medium"]];
  return (<div className="fade">
    <PageHeader title={t("nav_dev")} sub={t("dev_sub")} right={<AgentBadge name={t("eng_demand")}/>}/>
    <div className="cols-2">
      <Section title={t("dev_score")} sub={t("capacity_note")}>
        <div className="scrollx"><table className="tbl">
          <thead><tr><th>{t("tier_dev")}</th><th>{t("grade")}</th><th className="right-num">{t("score")}</th><th>{t("d_quality")}</th><th>{t("d_completion")}</th><th>{t("d_signing")}</th></tr></thead>
          <tbody>{DEVS.map(d=>(<tr key={d.name}>
            <td><b>{d.name}</b></td>
            <td><span className={"dev-grade "+d.grade}>{d.grade}</span></td>
            <td className="right-num mono" style={{fontWeight:700}}>{d.score}</td>
            {["quality","completion","signing"].map(k=>(<td key={k}><div className="bar-mini"><span style={{width:d[k]+"%"}}/></div></td>))}
          </tr>))}</tbody>
        </table></div>
      </Section>
      <Section title={t("dev_score")}>
        <div style={{width:"100%",height:300}}>{ok&&
          <C.ResponsiveContainer><C.RadarChart data={radar} margin={{top:8,right:18,left:18,bottom:8}}>
            <C.PolarGrid/><C.PolarAngleAxis dataKey="dim" tick={{fontSize:10}}/><C.PolarRadiusAxis domain={[0,100]} tick={{fontSize:9}}/>
            {DEVS.slice(0,5).map((dv,i)=><C.Radar key={dv.name} name={dv.name+" ("+dv.score+"/"+dv.grade+")"} dataKey={dv.name} stroke={RADC[i]} fill={RADC[i]} fillOpacity={0.06} strokeWidth={i<3?2:1}/>)}
            <C.Legend wrapperStyle={{fontSize:10}}/>
          </C.RadarChart></C.ResponsiveContainer>}
        </div>
      </Section>
    </div>
    <Section title={t("tiers_title")}>
      <div className="scrollx"><table className="tbl">
        <thead><tr><th>{t("tier")}</th><th>{t("tier_dev")}</th><th>{t("tier_action")}</th><th>{t("tier_out")}</th><th>{t("tier_when")}</th></tr></thead>
        <tbody>{tiers.map(([tk,pri])=>(<tr key={tk}>
          <td><span className={"rp "+pri} style={{fontSize:10,fontWeight:800,color:"#fff",borderRadius:6,padding:"3px 8px",background:pri==="immediate"?"var(--danger)":pri==="high"?"var(--amber)":"#1763a6"}}>{t(tk)}</span></td>
          <td>{t(tk+"d")}</td><td>{t(tk+"a")}</td><td className="mono">{t(tk+"o")}</td><td className="muted">{t(tk+"w")}</td>
        </tr>))}</tbody>
      </table></div>
    </Section>
  </div>);
}

/* =========================================================================
   App
   ========================================================================= */
const SEED_ALERTS=[
  { id:"AL-1", sev:"amber", tk:"al_moj_t", bk:"al_moj_b", ts:"06:10", ack:false, scn:null },
  { id:"AL-2", sev:"amber", tk:"al_conv_t", bk:"al_conv_b", ts:"05:40", ack:false, scn:null },
];
function App(){
  const [user,setUserState]=useState(null);
  const [lang,setLang]=useState(()=>{ try{ const q=new URLSearchParams(window.location.search).get("ln"); if(q==="zh"||q==="ar"||q==="en") return q; }catch(e){} return "en"; });
  const [cov,setCov]=useState("total");
  const [route,setRoute]=useState("hub");
  const [alerts,setAlerts]=useState(SEED_ALERTS);
  const [reports,setReports]=useState([]);
  const [log,setLog]=useState([]);
  const [seed,setSeed]=useState(null);
  const t=(k)=>{ const d=I18N[lang]; if(d&&d[k]!==undefined) return d[k]; const e=I18N.en; return (e&&e[k]!==undefined)?e[k]:k; };

  useEffect(()=>{ const html=document.documentElement; html.lang=lang; html.dir=lang==="ar"?"rtl":"ltr"; },[lang]);

  function pushLog(key,extra){ const txt = extra? (t(key)+" "+extra) : t(key);
    setLog(prev=>[{ts:timeStr(lang),text:txt},...prev].slice(0,40)); }
  // ambient log ticks
  useEffect(()=>{ if(!user) return; const id=setInterval(()=>{
      const keys=["log_idle","log_scan"]; pushLog(keys[Math.floor(Math.random()*keys.length)]);
    },9000); return ()=>clearInterval(id); /* eslint-disable-next-line */ },[user,lang]);

  function setUser(r){ setUserState(r); setRoute(r==="leader"?"cockpit":"hub"); if(r) pushLog("log_scan"); }
  function ackAlert(id){ setAlerts(prev=>prev.map(a=>a.id===id?{...a,ack:true}:a)); }
  function raiseGapAlert(){ setAlerts(prev=> prev.some(a=>a.id==="AL-GAP")? prev : [{id:"AL-GAP",sev:"red",tk:"al_gap_t",bk:"al_gap_b",ts:nowStr(lang).split(" ").slice(-1)[0],ack:false,scn:"q_gap"},...prev]); }
  function askOrchestrator(scn){ setSeed(scn); setRoute("chat"); }
  function clearSeed(){ setSeed(null); }
  function addReport(r){ setReports(prev=>[{...r,time:nowStr(lang)},...prev]); }
  function reset(){ setAlerts(SEED_ALERTS); setReports([]); setLog([]); setSeed(null); setRoute(user==="leader"?"cockpit":"hub"); }

  const store={ t,lang,setLang,cov,setCov,user,setUser,route,setRoute,alerts,ackAlert,raiseGapAlert,
    reports,addReport,log,pushLog,seed,askOrchestrator,clearSeed,reset };

  if(!user) return (<Ctx.Provider value={store}><Login/></Ctx.Provider>);

  let page=null;
  if(route==="chat") page=<ChatAnalysis/>;
  else if(route==="monitor") page=<Monitoring/>;
  else if(route==="macro") page=<MacroImpact/>;
  else if(route==="dev") page=<Developers/>;
  else if(route==="policy") page=<PolicySim/>;
  else if(route==="reports") page=<Reports/>;
  else if(route==="cockpit") page=<Cockpit/>;
  else if(route==="eco") page=<Ecosystem/>;
  else page = user==="leader"?<Cockpit/>:<Hub/>;

  return (<Ctx.Provider value={store}>
    <TopBar/>
    <div className="shell"><Sidebar/><div className="content">{page}</div></div>
    <AgentLog/>
  </Ctx.Provider>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    throw e;
  }
})();
</script>
</body>
