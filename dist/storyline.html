<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSO · Interactive Analyst Journey</title>
<style>
:root {
  --bg:#0a0f1e; --panel:#161e2e; --card:#1e293b; --border:#334155;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --blue:#3b82f6; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
  --cyan:#06b6d4; --purple:#8b5cf6; --pink:#ec4899;
  --radius:10px; --radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.7;min-height:100vh}
.container{max-width:1040px;margin:0 auto;padding:24px 28px}

/* ── Header ── */
.header{display:flex;align-items:center;gap:16px;padding:20px 24px;background:linear-gradient(135deg,rgba(30,41,59,.6),rgba(15,23,42,.4));border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;backdrop-filter:blur(8px)}
.header-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 12px rgba(59,130,246,.3)}
.header-info{flex:1;min-width:200px}
.header-info h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-info .sub{font-size:11px;color:var(--text2);margin-top:2px}
.header .mode-tag{font-size:10px;background:rgba(16,185,129,.15);color:#6ee7b7;padding:5px 12px;border-radius:20px;border:1px solid rgba(16,185,129,.25);white-space:nowrap}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;gap:4px;margin-bottom:20px;overflow-x:auto;padding:10px 16px;font-size:12px;flex-wrap:wrap;background:var(--panel);border-radius:var(--radius);border:1px solid var(--border)}
.step-item{display:flex;align-items:center;gap:6px;color:var(--text3);white-space:nowrap;padding:6px 12px;border-radius:8px;transition:all .25s}
.step-item .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;transition:all .3s}
.step-item.active{color:var(--text);font-weight:600;background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.step-item.active .dot{background:var(--blue);box-shadow:0 0 8px rgba(59,130,246,.5)}
.step-item.done{color:var(--green)}
.step-item.done .dot{background:var(--green)}
.step-arrow{color:var(--text3);margin:0 4px;font-size:10px}

/* ── Chat ── */
.chat{display:flex;flex-direction:column;gap:18px;padding:0 4px}
.msg-agent,.msg-user,.msg-analysis,.msg-alert,.msg-full{width:100%;padding:18px 22px;border-radius:var(--radius);font-size:14px;line-height:1.75;position:relative}
.msg-agent{max-width:100%;background:var(--panel);border:1px solid var(--border)}
.msg-user{max-width:56%;align-self:flex-end;background:linear-gradient(135deg,#1a3250,#1e3a5f);border:1px solid rgba(59,130,246,.25);border-radius:var(--radius) var(--radius) 4px var(--radius)}
.msg-analysis{max-width:100%;background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(6,78,59,.08));border:1px solid rgba(16,185,129,.15)}
.msg-alert{max-width:100%;background:linear-gradient(135deg,rgba(239,68,68,.06),rgba(127,29,29,.08));border:1px solid rgba(239,68,68,.15)}
.msg-full{max-width:100%;padding:0;background:none;border:none}
.msg .tag{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:6px;font-weight:600}

/* ── Thinking ── */
.thinking{display:flex;align-items:center;gap:8px;padding:12px 18px;font-size:13px;color:var(--text2)}
.thinking .dots{display:flex;gap:5px}
.thinking .dots span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:dotBounce 1.4s infinite}
.thinking .dots span:nth-child(2){animation-delay:.2s}
.thinking .dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:0}40%{opacity:1}}

/* ── Mind Map ── */
.mindmap-wrap{margin:10px 0}
.mm-root{background:linear-gradient(135deg,rgba(30,58,95,.8),rgba(30,64,175,.6));border:2px solid rgba(59,130,246,.4);border-radius:var(--radius-lg);padding:20px 24px;cursor:pointer;transition:all .3s;text-align:center}
.mm-root:hover{border-color:var(--cyan);box-shadow:0 0 24px rgba(59,130,246,.2);transform:translateY(-1px)}
.mm-root h3{font-size:16px;margin-bottom:6px}
.mm-root .hint{font-size:11px;color:var(--text2);margin-top:8px}
.mm-lines{display:flex;justify-content:center;gap:24px;margin-top:2px}
.mm-line{width:2px;height:28px;background:var(--border);transition:all .4s}
.mm-line.active{background:var(--blue);box-shadow:0 0 6px rgba(59,130,246,.4)}
.mm-branches{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px;opacity:0;max-height:0;overflow:hidden;transition:all .5s ease}
.mm-branches.open{opacity:1;max-height:300px}
.branch{padding:18px;border-radius:var(--radius);background:var(--card);border:1px solid transparent;cursor:pointer;transition:all .2s}
.branch:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.branch.neg{border-left:4px solid var(--red)}
.branch.mix{border-left:4px solid var(--amber)}
.branch.pos{border-left:4px solid var(--green)}
.branch h4{font-size:13px;margin-bottom:6px}
.branch p{font-size:11px;color:var(--text2);line-height:1.5}

/* ── Cards / Tables ── */
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin:8px 0;width:100%}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-ttl{font-size:14px;font-weight:600}
.badge{font-size:10px;padding:4px 10px;border-radius:8px;font-weight:600}
.badge-b{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-a{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-g{background:rgba(16,185,129,.15);color:#34d399}
.badge-r{background:rgba(239,68,68,.15);color:#fca5a5}

.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.tbl th{background:var(--panel);padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(71,85,105,.4)}
.tbl .hi{color:var(--red);font-weight:700}
.tbl .ok{color:var(--green);font-weight:700}
.tbl .wa{color:var(--amber);font-weight:700}
.tbl tr:hover{background:rgba(59,130,246,.04)}

.insight{padding:16px 20px;border-radius:var(--radius);margin:10px 0;font-size:13px;line-height:1.7}
.insight.inf{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.insight.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2)}
.insight.wrn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)}
.insight.amb{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}

.sc-row{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;font-size:12px}
.sc-tag{padding:6px 14px;border-radius:8px;color:#fff;font-weight:500;font-size:12px}
.sc-tag.sc-good{background:rgba(16,185,129,.2);color:#4ade80}
.sc-tag.sc-base{background:rgba(59,130,246,.2);color:#93c5fd}
.sc-tag.sc-bad{background:rgba(239,68,68,.2);color:#fca5a5}

.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0}
.btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;font-weight:500}
.btn:hover{background:var(--panel);border-color:var(--blue);transform:translateY(-1px);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.btn.pri:hover{box-shadow:0 4px 14px rgba(59,130,246,.4)}
.btn.suc{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.25)}
.btn.suc:hover{box-shadow:0 4px 14px rgba(16,185,129,.4)}
.btn.warn{background:var(--amber);border-color:var(--amber);color:#000}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.sm{padding:5px 12px;font-size:11px}
.btn:disabled{opacity:.4;pointer-events:none;transform:none;box-shadow:none}

/* ── PDF Preview ── */
.pdf-wrap{width:100%;border-radius:var(--radius-lg);overflow:hidden;margin:8px 0;box-shadow:0 4px 24px rgba(0,0,0,.4);border:2px solid var(--border)}
.pdf-wrap iframe{width:100%;height:620px;border:none;display:block}

/* ── Chart Images ── */
.chart-img{width:100%;border-radius:var(--radius);margin:8px 0;display:block;border:1px solid var(--border)}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.chart-row .chart-img{margin:0}
.chart-caption{font-size:10px;color:var(--text2);text-align:center;margin-top:4px}

/* ── Phase Divider ── */
.phase-divider{text-align:center;font-size:11px;color:var(--text3);padding:8px 0;letter-spacing:1px;font-weight:500}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .45s ease}
.hidden{display:none!important}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="header-icon">🏠</div>
  <div class="header-info">
    <h1>DSO · Interactive Analyst Journey</h1>
    <div class="sub">AI_H_01 | Ahmed Al-Qahtani — Housing Data Analyst</div>
  </div>
  <div class="mode-tag">MOMAH · Total Market Coverage</div>
</div>

<!-- STEPPER -->
<div class="stepper" id="stepper">
  <span class="step-item active" data-sid="0"><span class="dot"></span>问题发现</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="1"><span class="dot"></span>宏观冲击</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="2"><span class="dot"></span>需求预测</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="3"><span class="dot"></span>缺口分析</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="4"><span class="dot"></span>供给评估</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="5"><span class="dot"></span>措施对比</span><span class="step-arrow">→</span>
  <span class="step-item" data-sid="6"><span class="dot"></span>报告定稿</span>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

</div>

<script>
// ═══════════════════════════════════════════
//  STATE MACHINE
// ═══════════════════════════════════════════
const PHASES = ['发现','宏观冲击','需求预测','缺口分析','供给评估','措施对比','报告定稿'];

let state = {
  step: 0,
  choices: {},     // analyst decisions per phase
  reportEdits: [], // analyst annotations on report
  locked: false    // prevent double-click
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function $(id) { return document.getElementById(id); }

function chatBox() { return $('chat'); }

function scrollDown() {
  chatBox().lastElementChild?.scrollIntoView({behavior:'smooth',block:'end'});
}

function addMsg(type, html, delay=300) {
  const div = document.createElement('div');
  var cls = 'msg-' + type;
  div.className = cls + ' fade-in';
  div.innerHTML = html;
  setTimeout(() => {
    chatBox().appendChild(div);
    scrollDown();
  }, delay);
}

function addPhaseDivider(step) {
  const div = document.createElement('div');
  div.className = 'phase-divider fade-in';
  div.textContent = '── Phase ' + (step+1) + ' · ' + PHASES[step] + ' ──';
  chatBox().appendChild(div);
  scrollDown();
}

function updateStepper(idx) {
  state.step = idx;
  document.querySelectorAll('.step-item').forEach(function(el,i){
    el.classList.remove('active','done');
    if (i < idx) el.classList.add('done');
    if (i === idx) el.classList.add('active');
  });
}

function showThinking(text, duration, callback) {
  const div = document.createElement('div');
  div.className = 'msg-agent fade-in';
  div.innerHTML = '<div class="thinking">' + text + ' <span class="dots"><span></span><span></span><span></span></span></div>';
  chatBox().appendChild(div);
  scrollDown();
  setTimeout(function(){
    div.remove();
    if (callback) callback();
  }, duration);
}

// ═══════════════════════════════════════════
//  PHASE ROUTER
// ═══════════════════════════════════════════
function goPhase(idx) {
  if (state.locked) return;
  state.locked = true;
  setTimeout(function(){ state.locked = false; }, 800);
  updateStepper(idx);
  switch(idx) {
    case 0: phase0(); break;
    case 1: phase1(); break;
    case 2: phase2(); break;
    case 3: phase3(); break;
    case 4: phase4(); break;
    case 5: phase5(); break;
    case 6: phase6(); break;
  }
}

// ═══════════════════════════════════════════
//  PHASE 0 — DISCOVERY (问题发现)
// ═══════════════════════════════════════════
function phase0() {
  addPhaseDivider(0);

  // Rate alert
  addMsg('alert',
    '<div class="tag">Sunday, 19 June 2026 · 08:04 GMT+3</div>' +
    '<strong>Ahmed Al-Qahtani</strong> 打开 DSO 仪表板，一条红色横幅在顶部闪烁：' +
    '<div class="insight wrn" style="margin:10px 0">' +
      '<strong>⚠ SAMA Rate Alert</strong><br>' +
      '沙特央行在休会 9 个月后，宣布将政策利率从 <strong>4.25% 上调至 4.75%</strong>（+50bps）。<br>' +
      '这是自 2024 年 6 月以来首次加息。Next review: Jul 2026.' +
    '</div>'
  );

  // Analyst reaction
  addMsg('user',
    '这不对劲……从 2022 年峰值 6.00% 降了两年，现在突然又加 50 个基点？<br><br>' +
    '我需要了解这次冲击的影响范围和严重程度。',
    600
  );

  // Thinking
  setTimeout(function(){
    showThinking('DSO Agent 正在构建利率冲击的影响脑图...', 2200, function(){
      // Mind map
      addMsg('agent',
        '<div class="tag">DSO Agent 建议 — 冲击影响分析</div>' +
        '<div class="mindmap-wrap">' +
          '<div class="mm-root" id="mmRoot" onclick="expandMindmap()">' +
            '<h3>⬆ SAMA Policy Rate: 4.25% → 4.75% (+50bps)</h3>' +
            '<div class="hint">点击展开影响分析</div>' +
          '</div>' +
          '<div style="display:flex;justify-content:center;gap:20px" id="mmLines">' +
            '<div class="mm-line"></div><div class="mm-line"></div><div class="mm-line"></div>' +
          '</div>' +
          '<div class="mm-branches" id="mmBranches">' +
            '<div class="branch neg">' +
              '<h4>📉 Housing Demand</h4>' +
              '<p>月供变贵 → 可负担房价上限下降 → 购房者转向更低价位住房 → Most in Need 需求激增</p>' +
            '</div>' +
            '<div class="branch neg">' +
              '<h4>🏗️ Housing Supply</h4>' +
              '<p>开发商融资成本上升 → Most in Need 住房利润更薄 → 项目转化率下滑 → 缺口扩大</p>' +
            '</div>' +
            '<div class="branch mix">' +
              '<h4>💰 Fiscal Budget</h4>' +
              '<p>Sakani补贴人数激增 +22% → 财政压力 ~SAR 1.8B/年 · 政府收入端可能因油价传导</p>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="insight inf" style="margin-top:12px">' +
          '<strong>DSO 建议：</strong>先量化宏观经济指标的冲击强度——计算利率、通胀、GDP等 6 大指标与住房供需的相关性，构建三种情景。<br>' +
          '<strong>理由：</strong>宏观是下游所有分析的锚。没有情景，需求预测和缺口分析没有基线。' +
        '</div>' +
        '<div class="btn-row" id="p0Btns">' +
          '<button class="btn pri" onclick="acceptPhase0()">✅ 同意，开始宏观分析</button>' +
        '</div>'
      );
    });
  }, 1200);
}

function expandMindmap() {
  $('mmBranches').classList.add('open');
  var lines = $('mmLines').children;
  for (var i=0; i<lines.length; i++) lines[i].classList.add('active');
  $('mmRoot').querySelector('.hint').textContent = '已展开：需求 · 供给 · 财政三方面影响';
}

function acceptPhase0() {
  state.choices['discovery'] = 'macro';
  $('p0Btns').innerHTML = '<span style="font-size:12px;color:var(--green)">✅ 已确认，正在启动宏观分析引擎...</span>';
  expandMindmap();
  goPhase(1);
}

// ═══════════════════════════════════════════
//  PHASE 1 — MACRO IMPACT (宏观冲击)
// ═══════════════════════════════════════════
function phase1() {
  addPhaseDivider(1);

  showThinking('UC-09 Macro-Economic Engine 运行中... 计算 Pearson r 相关性... 构建三种情景...', 2800, function(){

    addMsg('agent',
      '<div class="tag">UC-09 Macro-Economic Impact Engine · 47s</div>' +
      '<div class="card">' +
        '<div class="card-hd"><span class="card-ttl">Pearson r — 宏观经济指标 vs 住房供需</span><span class="badge badge-a">基准情景 55%</span></div>' +
        '<img src="charts/chart1_macro_corr.png" class="chart-img" alt="Macro Correlation">' +
        '<div style="font-size:11px;color:var(--text2);margin-top:6px">利率主导驱动：r=-0.90 vs 价格、r=-0.85 vs 需求 — 加息直接压制供需两端。|r|>0.6 阈值识别 4 个强预测指标。</div>' +
      '</div>'
    );

    addMsg('agent',
      '<div class="sc-row">' +
        '<span class="sc-tag sc-good">🟢 乐观 20%: 降至3.75% by Dec 2027</span>' +
        '<span class="sc-tag sc-base">🟡 基准 55%: 维持4.75% 至2028</span>' +
        '<span class="sc-tag sc-bad">🔴 悲观 25%: 升至5.00% by Mar 2027</span>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--text2)">' +
        '利率直接压制供需两端。人口和 GDP 的正相关性说明：如果经济持续增长，需求自发膨胀——但没有供给配合，缺口只会加大。' +
      '</div>' +
      '<div class="insight inf" style="margin-top:12px">' +
        '<strong>DSO 建议下一步：</strong>有了情景基线，需要量化"谁会受影响"——按住房类型预测未来 3 年利雅得需求，重点追踪购房者从 Low/Mid Income 向 Most in Need 住房的转移。<br>' +
        '<strong>理由：</strong>利率抬高月供后，家庭可负担的房价上限下降——他们收入的段位没变，能买的房子变了。' +
      '</div>' +
      '<div class="btn-row" id="p1Btns">' +
        '<button class="btn pri" onclick="acceptPhase1()">✅ 同意，预测需求</button>' +
      '</div>'
    );

  });
}

function acceptPhase1() {
  state.choices['macro'] = 'demand';
  $('p1Btns').innerHTML = '<span style="font-size:12px;color:var(--green)">✅ 已确认，正在启动需求预测引擎...</span>';
  goPhase(2);
}

// ═══════════════════════════════════════════
//  PHASE 2 — DEMAND FORECAST (需求预测)
// ═══════════════════════════════════════════
function phase2() {
  addPhaseDivider(2);

  showThinking('UC-02 Demand Intelligence Engine 运行中... 人口队列模型 + 集成学习... 计算段间转移...', 2800, function(){

    addMsg('agent',
      '<div class="tag">UC-02 Demand Intelligence Engine · 31s</div>' +
      '<div class="card">' +
        '<div class="card-hd"><span class="card-ttl">Riyadh 5-Year Demand Forecast — 基准情景</span><span class="badge badge-b">Unit: Households</span></div>' +
        '<img src="charts/chart2_demand_forecast.png" class="chart-img" alt="Demand Forecast">' +
        '<div style="font-size:11px;color:var(--text2);margin-top:6px;padding:6px 10px;background:rgba(59,130,246,.08);border-radius:6px">' +

  state.choices['finalDecision'] = choice;
  var btns = $('p5Btns').querySelectorAll('.btn');
  for (var i=0; i<btns.length; i++) { btns[i].disabled = true; btns[i].style.opacity = '0.5'; }

  if (choice === 'accept') {
    addMsg('user', '同意。组合 #1 就是最优方案。请生成完整的部长简报 PDF——包含所有分析图表、数据表和战略建议。MOMAH 品牌模板。');
    state.choices['combo'] = '#1';
  } else if (choice === 'add-demand') {
    addMsg('user', '组合 #1 是供给核心，但政治压力下可能需要需求端补充。请基于组合 #3（M1+M5）生成简报，并在报告中标注 M5 必须配合 M1 实施。');
    state.choices['combo'] = '#3';
  } else {
    addMsg('user', '我想把 M4（PPP 合同）也纳入——虽然见效慢，但长期是结构性方案。请按组合 #2（M1+M2+M3+M4）生成简报。');
    state.choices['combo'] = '#2';
  }

  addMsg('agent',
    '<div class="btn-row">' +
      '<button class="btn pri" onclick="goPhase(6)">📄 开始生成简报</button>' +
    '</div>'
  );
}

// ═══════════════════════════════════════════
//  PHASE 6 — REPORT & ITERATION (报告定稿)
// ═══════════════════════════════════════════
function phase6() {
  addPhaseDivider(6);

  showThinking('UC-07 Report Generation Engine 运行中... 生成 8 张图表... LLM 双语摘要... PDF 编译...', 4000, function(){

    addMsg('agent',
      '<div class="tag">UC-07 Report Generation · 38s — 简报已生成</div>' +
      '<div style="color:var(--green);margin-top:6px">✅ DSO_Ministerial_Briefing.pdf · 8 charts + 2 tables · DGA Standard</div>'
    );

    addMsg('full',
      '<div class="tag">简报预览 — 请审阅</div>' +
      '<div class="pdf-wrap">' +
        '<iframe src="DSO_Ministerial_Briefing.pdf"></iframe>' +
      '</div>'
    );

    // Actions
    addMsg('agent',
      '<div class="tag">简报已生成 — 你可以审阅并确认</div>' +
      '<div class="btn-row" id="p6EditBtns">' +
        '<button class="btn sm" onclick="editReport(\'rate\')">📝 补充利率历史时间线</button>' +
        '<button class="btn sm" onclick="editReport(\'eastern\')">📝 补充东部省数据</button>' +
        '<button class="btn sm" onclick="editReport(\'risk\')">📝 补充悲观情景压力测试</button>' +
        '<button class="btn sm suc" onclick="finalizeReport()">✅ 满意，生成最终版</button>' +
      '</div>' +
      '<div style="margin-top:8px;padding:10px 14px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;font-size:12px">' +
        '📥 <a href="DSO_Ministerial_Briefing.pdf" download style="color:var(--green);text-decoration:underline;font-weight:600">下载 PDF</a>' +
        ' <span style="color:var(--text2)">(8 charts + 2 tables · DGA Std)</span>' +
        ' &nbsp;|&nbsp; 📄 <a href="DSO_Ministerial_Briefing.docx" download style="color:var(--cyan);text-decoration:underline;font-weight:600">下载 Word</a>' +
      '</div>'
    );

  });
}

function editReport(topic) {
  if (state.reportEdits.indexOf(topic) >= 0) return;
  state.reportEdits.push(topic);

  var note = '';
  if (topic === 'rate') {
    note = '建议在简报中增加 SAMA 利率决策历史时间线，说明此次加息是在 9 个月降息周期后的突然逆转，与市场预期相反——这会放大需求端的心理冲击。';
  } else if (topic === 'eastern') {
    note = '东部省 Low Income 缺口（-8,700）被报告中一笔带过。建议在政策矩阵中注明 M1+M2+M3 的措施是全国性部署，东部省可按比例受益（~20% 产出分配）。';
  } else if (topic === 'risk') {
    note = '悲观情景下（SAMA 再加 25bps 至 5.00%）Most in Need 缺口会膨胀至 17,200 套（+39%）。建议增加一段悲观情景作为压力测试底线，并明确当前措施在悲观下仍能达到 ~70% 闭合。';
  }

  addMsg('user',
    '<div style="background:#fef08a;color:#1e293b;padding:10px 14px;border-radius:8px;font-size:12px">' +
      '<strong>✏️ Ahmed 补充意见：</strong> ' + note +
    '</div>',
    200
  );
}

function finalizeReport() {
  var btns = $('p6EditBtns').querySelectorAll('.btn');
  for (var i=0; i<btns.length; i++) { btns[i].disabled = true; btns[i].style.opacity = '0.5'; }

  showThinking('重新编译简报... 融入 Ahmed 的修改意见... 更新图表和叙事...', 3500, function(){

    addMsg('agent',
      '<div style="color:var(--green);font-weight:600">✅ 最终简报已更新 — DSO_Ministerial_Briefing_vFINAL.pdf</div>' +
      '<div style="font-size:12px;color:var(--text2);margin-top:4px">' +
        '已融入 ' + state.reportEdits.length + ' 项分析师意见 · 13 pages · 9 charts · Human Reviewed' +
      '</div>'
    );

    addMsg('analysis',
      '<strong>🎯 Journey Complete</strong><br>' +
      '<strong>总耗时：</strong>~4 分钟（传统方式 3-4 天）<br>' +
      '<strong>分析步骤：</strong>宏观 → 需求 → 缺口 → 供给 → 政策 → 报告<br>' +
      '<strong>分析师互动次数：</strong>' + (Object.keys(state.choices).length + state.reportEdits.length) + ' 次<br>' +
      '<strong>最终方案：</strong>Combo ' + (state.choices['combo'] || '#1') + ' · SAR 3.2B/yr · ' +
      (state.choices['combo'] === '#3' ? '78%' : (state.choices['combo'] === '#2' ? '100%+' : '97%')) + ' 闭合'
    );

    updateStepper(7);
  });
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
(function init() {
  setTimeout(function(){ goPhase(0); }, 500);
})();
</script>

</body>
</html>
