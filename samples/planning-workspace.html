<html lang="zh">

<meta charset="utf-8"/>

<title>DSO · Strategic Cockpit (Planning Manager)</title>

<style>
:root{
  --green:#1B8354;--green-dark:#14633f;--green-d:#11593a;--green-50:#eaf5ef;--green-100:#d6ebe0;
  --ink:#0f1a14;--muted:#647067;--faint:#8a958d;--bg:#f4f7f5;--card:#ffffff;--border:#e4eae5;--border-2:#d4ddd6;
  --indigo:#4f46e5;--indigo-2:#6d5ae6;--indigo-50:#eef0fc;
  --amber:#b9770e;--amber-50:#fdf4e3;
  --crit:#c0392b;--crit-50:#fdecea;--watch:#b9770e;--watch-50:#fdf4e3;--ok:#1B8354;--ok-50:#eaf5ef;
  --r:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:"IBM Plex Sans Arabic",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
/* top nav — light, ref: momah-poc governance */
.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;background:#fff;color:var(--ink);padding:0 22px;height:62px;border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(15,42,30,.03)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;white-space:nowrap;text-decoration:none;color:var(--ink)}
.brand .dot{width:30px;height:30px;border-radius:8px;background:var(--green);display:grid;place-items:center;color:#fff;font-size:15px}
.brand .bt{line-height:1.1}.brand .bt small{display:block;font-size:10px;font-weight:600;color:var(--muted)}
.nav{display:flex;gap:2px;margin-inline-start:8px}
.nav button{border:0;background:transparent;font:inherit;font-size:13.5px;font-weight:600;color:var(--muted);padding:8px 13px;border-radius:8px;cursor:pointer;border-bottom:2.5px solid transparent}
.nav button.on{color:var(--green-d);border-bottom-color:var(--green)}
.nav button:hover{color:var(--ink)}
.spacer{flex:1}
.cov{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:3px}
.cov button{border:0;background:transparent;font:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:5px 11px;border-radius:999px;cursor:pointer}
.cov button.on{background:var(--green);color:#fff}
.icobtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:16px;position:relative}
.icobtn:hover{background:var(--bg);color:var(--ink)}
.icobtn .badge{position:absolute;top:-5px;inset-inline-end:-5px;background:var(--crit);color:#fff;font-size:9px;line-height:1;border-radius:999px;padding:2px 4px;font-weight:700}
.ava{width:32px;height:32px;border-radius:50%;background:var(--indigo);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12.5px}
.live{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.popover{position:fixed;top:64px;inset-inline-end:22px;width:300px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(15,42,30,.16);padding:12px;z-index:40}
.popover .pi{padding:9px 6px;border-bottom:1px dashed var(--border);font-size:12.5px;display:flex;justify-content:space-between;gap:10px}
.popover .pi:last-child{border-bottom:0}
/* layout */
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.h1{font-size:21px;font-weight:700;margin:0 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card+.card{margin-top:16px}
.grid{display:grid;gap:14px}
.k5{grid-template-columns:repeat(5,1fr)}.k4{grid-template-columns:repeat(4,1fr)}.k3{grid-template-columns:repeat(3,1fr)}.k2{grid-template-columns:2fr 1fr}
@media(max-width:980px){.k5,.k4{grid-template-columns:repeat(2,1fr)}.k3,.k2{grid-template-columns:1fr}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.kpi .lab{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi .val{font-size:26px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .d{font-size:11.5px;margin-top:3px;color:var(--muted)}
.up{color:var(--crit)}.dn{color:var(--indigo)}
.sev{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.sev.crit{background:var(--crit-50);color:var(--crit)}.sev.watch{background:var(--watch-50);color:var(--watch)}.sev.ok{background:var(--ok-50);color:var(--ok)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--green-50);color:var(--green-d)}
.tag.indigo{background:var(--indigo-50);color:var(--indigo)}.tag.amber{background:var(--amber-50);color:var(--amber)}.tag.gray{background:#eef1ee;color:var(--muted)}.tag.crit{background:var(--crit-50);color:var(--crit)}
.btn{border:0;border-radius:9px;background:var(--green);color:#fff;font:inherit;font-weight:600;padding:10px 18px;cursor:pointer}
.btn:hover{filter:brightness(1.06)}
.btn.indigo{background:var(--indigo)}.btn.amber{background:var(--amber)}.btn.dark{background:#0f2a1e}
.btn.ghost{background:transparent;color:var(--green-d);border:1px solid var(--green)}
.btn.ret{background:transparent;color:var(--muted);border:1px solid var(--border-2)}
.sectit{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
.muted{color:var(--muted)}.row{display:flex;align-items:center;gap:10px}.between{display:flex;align-items:center;justify-content:space-between;gap:12px}.wrap2{flex-wrap:wrap}
/* hero decision */
.hero{background:linear-gradient(120deg,#0f2a1e,#16523a);color:#eaf5ef;border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.hero .flag{font-size:11px;font-weight:700;letter-spacing:.6px;color:#9fe0bf}
.hero h2{font-size:21px;margin:8px 0 6px;color:#fff}
.hero .guard{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}
.gbadge{font-size:11px;font-weight:600;background:rgba(255,255,255,.12);color:#d6f0e2;padding:4px 10px;border-radius:999px}
.hero .stats{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:16px}
.hero .stats .v{font-size:26px;font-weight:700}
.hero .stats .l{font-size:11px;color:#9fe0bf;text-transform:uppercase;letter-spacing:.4px}
/* domain cards */
.dom{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:.15s}
.dom:hover{border-color:var(--green);transform:translateY(-1px)}
.dom .nm{font-weight:700;margin:7px 0 2px}
.dom .mt{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.dom .ds{font-size:12px;color:var(--muted);margin-top:4px}
/* flow */
.step{display:flex;gap:14px;padding:10px 0}
.rail{display:flex;flex-direction:column;align-items:center}
.bead{width:30px;height:30px;border-radius:50%;border:2px solid var(--border-2);background:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted);flex:0 0 auto;transition:.3s}
.line{width:2px;flex:1;background:var(--border-2);margin:3px 0;min-height:16px}
.step.done .bead{background:var(--green);border-color:var(--green);color:#fff}
.step.run .bead{background:var(--indigo);border-color:var(--indigo);color:#fff;animation:pulse 1.2s infinite}
.step.gate .bead{background:var(--amber);border-color:var(--amber);color:#fff}
.step.idle .bead{opacity:.5}
.step .lyr{font-size:11px;font-weight:700;color:var(--indigo)}.step.gate .lyr{color:var(--amber)}
.step .tt{font-weight:600;margin-top:1px}.step .dd{font-size:12.5px;color:var(--muted);margin-top:2px}
.step .ts{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;margin-top:3px}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,70,229,.5)}70%{box-shadow:0 0 0 7px rgba(79,70,229,0)}100%{box-shadow:0 0 0 0 rgba(79,70,229,0)}}
.gatecard{border:1.5px solid var(--amber);background:var(--amber-50);border-radius:var(--r);padding:16px;margin-top:8px}
/* decision deck */
.deck{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:980px){.deck{grid-template-columns:repeat(2,1fr)}}
.scn{border:1px solid var(--border);border-radius:var(--r);padding:14px;background:var(--card);position:relative}
.scn.best{border:2px solid var(--green);box-shadow:0 4px 16px rgba(27,131,84,.12)}
.scn .tg{font-size:10.5px;font-weight:700;letter-spacing:.4px;color:var(--muted)}
.scn.best .tg{color:var(--green-d)}
.scn .nm{font-weight:700;margin:5px 0 2px;font-size:14px}
.scn .de{font-size:11.5px;color:var(--muted);min-height:32px}
.scn .big{font-size:30px;font-weight:700;margin:8px 0 0;font-variant-numeric:tabular-nums}
.scn .three{display:flex;gap:10px;margin:8px 0;font-size:11px}
.scn .three .v{font-weight:700;font-size:14px}
.capok{color:var(--green-d);font-weight:700;font-size:11.5px}.capbad{color:var(--crit);font-weight:700;font-size:11.5px}
.scn .note{font-size:11px;color:var(--muted);margin-top:6px;border-top:1px dashed var(--border);padding-top:6px}
/* workbench */
.attr{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:8px 0;font-size:12px;font-weight:700;color:#fff}
.attr .m{background:var(--amber);display:grid;place-items:center}.attr .p{background:var(--indigo);display:grid;place-items:center}
.chip{display:inline-flex;gap:4px;align-items:center;font-size:12px;border:1px solid var(--border);border-radius:999px;padding:5px 11px;margin:0 6px 6px 0;background:#fff}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th,.tbl td{border:1px solid var(--border);padding:7px 9px;text-align:start}
.tbl th{background:var(--green-50);color:var(--green-d);font-weight:700}
.act{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px dashed var(--border)}
.rk{width:22px;height:22px;border-radius:50%;background:var(--indigo);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex:0 0 auto}
.drawer{border:1px dashed var(--indigo);background:var(--indigo-50);border-radius:var(--r);padding:14px;margin-top:12px}
.led{font-size:12.5px;color:var(--muted);line-height:1.8}.led b{color:var(--ink)}
.hide{display:none}.mono{font-variant-numeric:tabular-nums}
.scorecard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:980px){.scorecard{grid-template-columns:1fr}}
.scbox{border:1px solid var(--border);border-radius:var(--r);padding:13px}
/* multi-agent reasoning theater */
.theater{display:grid;grid-template-columns:206px 1fr;gap:16px}@media(max-width:880px){.theater{grid-template-columns:1fr}}
.dsrail .dsc{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;padding:6px 9px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fff;transition:.3s}
.dsc.ok{border-color:var(--green);background:var(--green-50)}
.dsc .st{font-size:10px;color:var(--faint)}.dsc.ok .st{color:var(--green-d);font-weight:700}
.agentcard{border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:#fff}
.agentcard.active{border-color:var(--indigo);box-shadow:0 3px 16px rgba(79,70,229,.13)}
.agentcard.gatec{border-color:var(--amber);background:var(--amber-50)}
.ah{display:flex;align-items:center;gap:9px;font-weight:700}
.ah .ic{width:26px;height:26px;border-radius:7px;background:var(--indigo-50);color:var(--indigo);display:grid;place-items:center;flex:0 0 auto;font-size:14px}
.ah .lyr{font-size:10.5px;font-weight:700;color:var(--indigo);margin-inline-start:auto}
.ln{font-size:12.5px;margin:7px 0 0;padding-inline-start:23px;position:relative;animation:fade .35s}
.ln.think{color:var(--muted)}.ln.think:before{content:"✦";position:absolute;inset-inline-start:0;color:var(--indigo)}
.ln.call:before{content:"⛁";position:absolute;inset-inline-start:0;color:var(--indigo)}
.ln.calc{color:var(--ink);font-variant-numeric:tabular-nums}.ln.calc:before{content:"∑";position:absolute;inset-inline-start:0;color:var(--green)}
.ln.out{color:var(--green-d);font-weight:600}.ln.out:before{content:"→";position:absolute;inset-inline-start:0;color:var(--green)}
.ln .res{font-weight:700;color:var(--green-d);background:var(--green-50);padding:1px 8px;border-radius:6px;margin-inline-start:7px}
.dots:after{content:"";animation:dots 1.1s steps(4,end) infinite}
@keyframes dots{0%{content:""}25%{content:"·"}50%{content:"··"}75%{content:"···"}}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.slider{display:flex;align-items:center;gap:12px;margin:10px 0}.slider label{width:140px;font-size:12.5px;color:var(--muted)}
.slider input[type=range]{flex:1;accent-color:var(--green)}.slider .sv{width:96px;text-align:end;font-weight:700;font-variant-numeric:tabular-nums}
.fres{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}@media(max-width:880px){.fres{grid-template-columns:repeat(2,1fr)}}
.fbox{border:1px solid var(--border);border-radius:10px;padding:11px 13px;background:var(--card)}
.fbox .l{font-size:11px;color:var(--muted)}.fbox .b{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px}
</style>
</head>

/* trajectory svg: Seg A coverage 2024->2030, target 85 */
function traj(){
  const yrs=["2024","2025","2026","2027","2028","2029","2030"];
  const base=[33,34,35,36,37,37,38],prop=[35,42,55,66,73,76,78],opt=[35,48,62,72,79,83,85];
  const W=620,H=210,pl=38,pr=14,pt=14,pb=26;
  const x=i=>pl+(W-pl-pr)*i/(yrs.length-1), y=v=>pt+(H-pt-pb)*(1-(v-30)/(90-30));
  const path=a=>a.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  let g="";for(const v of[30,50,70,90])g+=`<line x1="${pl}" y1="${y(v)}" x2="${W-pr}" y2="${y(v)}" stroke="#eef2ef"/><text x="6" y="${y(v)+3}" font-size="9" fill="#8a958d">${v}%</text>`;
  g+=`<line x1="${pl}" y1="${y(85)}" x2="${W-pr}" y2="${y(85)}" stroke="#1B8354" stroke-dasharray="4 3"/><text x="${W-pr-2}" y="${y(85)-4}" font-size="9" fill="#1B8354" text-anchor="end">目标 85%</text>`;
  yrs.forEach((yr,i)=>g+=`<text x="${x(i)}" y="${H-8}" font-size="9" fill="#8a958d" text-anchor="middle">${yr}</text>`);
  g+=`<path d="${path(base)}" fill="none" stroke="#c0392b" stroke-width="2"/><path d="${path(prop)}" fill="none" stroke="#b9770e" stroke-width="2" stroke-dasharray="5 3"/><path d="${path(opt)}" fill="none" stroke="#4f46e5" stroke-width="2.4"/>`;
  g+=`<circle cx="${x(6)}" cy="${y(85)}" r="3.5" fill="#4f46e5"/><circle cx="${x(6)}" cy="${y(38)}" r="3.5" fill="#c0392b"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${g}</svg>`;
}

/* ===== Multi-Agent Reasoning Theater ===== */
function flowReset(){clearTimeout(S.timer);S.fa=-1;S.fl=-1;S.fdone=false;S.fgate=false;S.fapp=false;S.fds={};S.playing=false;renderFlow();}
function flowRun(){S.playing=true;if(S.fa<0){S.fa=0;S.fl=-1;}stepNext();}
function flowStep(){S.playing=false;clearTimeout(S.timer);if(S.fa<0){S.fa=0;S.fl=-1;}stepNext();}
function stepNext(){
  if(S.fdone||S.fgate)return;
  const ag=AGENTS[S.fa];
  if(S.fl<ag.lines.length-1){
    S.fl++;const ln=ag.lines[S.fl];
    if(ln.k==="call"&&ln.ds)ln.ds.forEach(d=>{S.fds[d]="ok"});
    renderFlow();
    if(S.playing)S.timer=setTimeout(stepNext,ln.k==="calc"?950:ln.k==="call"?900:700);
  }else{
    if(ag.gate){S.fgate=true;renderFlow();return;}
    if(S.fa<AGENTS.length-1){S.fa++;S.fl=-1;renderFlow();if(S.playing)S.timer=setTimeout(stepNext,520);}
    else{S.fdone=true;renderFlow();}
  }
}
function flowApprove(){S.fgate=false;S.fapp=true;S.fa++;S.fl=-1;S.playing=true;renderFlow();S.timer=setTimeout(stepNext,500);}
function flowReturn(){flowReset();}
function renderFlow(){
  const rail=DSOURCES.map(d=>{const ok=S.fds[d[0]]==="ok";return `<div class="dsc ${ok?'ok':''}"><span>${d[0]} ${d[1]}</span><span class="st">${ok?'✓':'·'}</span></div>`;}).join("");
  let stream="";
  if(S.fa<0){
    stream=`<div class="card" style="text-align:center;padding:34px"><div class="muted" style="margin-bottom:14px">点击运行,观看 7 个智能体如何一步步「想 → 取数 → 计算 → 产出」,并在治理门交回给你决策。</div>
      <button class="btn indigo" onclick="flowRun()">▶ 运行多智能体分析</button></div>`;
  }else{
    for(let i=0;i<=S.fa && i<AGENTS.length;i++){
      const ag=AGENTS[i];const active=(i===S.fa&&!S.fdone);
      const shown=(i<S.fa)?ag.lines.length:(S.fl+1);
      let lns="";
      for(let j=0;j<shown;j++){const ln=ag.lines[j];
        const isLast=active&&j===shown-1;
        const dots=(isLast&&ln.k==="think"&&S.playing)?'<span class="dots"></span>':'';
        lns+=`<div class="ln ${ln.k}">${ln.t}${ln.val?` <span class="res">${ln.val}</span>`:''}${dots}</div>`;}
      stream+=`<div class="agentcard ${active?'active':''} ${ag.gate?'gatec':''}">
        <div class="ah"><span class="ic">${ag.ic}</span>${ag.ag}<span class="lyr">${ag.lyr}</span></div>${lns}</div>`;
    }
  }
  if(S.fgate)stream+=`<div class="gatecard"><div class="row wrap2"><span class="tag amber">⚠ 治理门 · Human-in-the-Loop</span><b>未覆盖 65% &gt; 30% 阈值 — 需要 Planning Manager 批准</b></div>
    <div class="muted" style="font-size:12.5px;margin:8px 0 12px">AI 的产出此刻仍是「建议/草稿」,批准前不会上报或对外分发。已过 HUMAN-REVIEWED(04:48)与 LEGAL CLEARED(05:31)两道护栏。</div>
    <div class="row wrap2"><button class="btn amber" onclick="flowApprove()">✓ 批准并继续</button><button class="btn ret" onclick="flowReturn()">退回修改</button><button class="btn ret" onclick="setView('deck')">先看决策甲板</button></div></div>`;
  if(S.fdone)stream+=`<div class="row wrap2" style="margin-top:6px"><span class="tag">✓ 完成 · 审计日志已记录 · SSOT 已推送</span><button class="btn" onclick="setView('bench')">查看分析工作台 →</button><button class="btn ret" onclick="setView('deck')">决策甲板 →</button></div>`;
  const ctrl=S.fa<0?'':`<div class="ctrl">
     ${S.playing?'<button class="btn ret" onclick="S.playing=false;clearTimeout(S.timer);renderFlow()">⏸ 暂停</button>':(!S.fdone&&!S.fgate?'<button class="btn indigo" onclick="flowRun()">▶ 继续</button>':'')}
     ${(!S.fdone&&!S.fgate)?'<button class="btn ret" onclick="flowStep()">⏭ 下一步</button>':''}
     <button class="btn ret" onclick="flowReset()">↻ 重放</button></div>`;
  $("#app").innerHTML=`<div class="between"><div><div class="h1">多智能体推理剧场 · L1 → L5</div>
    <div class="sub">看 AI「想 → 取数 → 逐步计算 → 产出」,治理门交回人工　|　对应 BRD 第 13 章 Agent 决策范围</div></div>
    <span class="tag indigo">✦ Orchestrator ${S.fdone?'已完成':S.fgate?'待批准':S.fa<0?'就绪':'运行中'}</span></div>
    ${ctrl}
    <div class="theater"><div class="dsrail"><div class="sectit">数据源 · 11</div>${rail}</div><div>${stream}</div></div>`;
}

    <div class="slider"><label>补贴率(%)</label><input type="range" min="10" max="20" step="1" value="${FIS.sub}" oninput="FIS.sub=+this.value;fisUpd()"><span class="sv" id="fv3">${FIS.sub}%</span></div>

function fis(){
  const i=FIS.invest,l=FIS.loan,s=FIS.sub;
  const units=Math.round(i*1290*(s/15));                 // 补贴投资 → 新增 Seg A 供给
  const cover=Math.min(99,Math.round((6700+units)/19100*100));
  const gapLeft=Math.max(0,12400-units);
  const hh=Math.round(l*1e9/500000);                     // 按揭贷款 → 受益家庭
  const cost=+(i+l*0.5).toFixed(1);                       // 当年财政投放(贴息按 50% 计)
  const cap=6.0;
  // 3 年延续性:投放 60/30/10,贷款回流 Y2/Y3
  const y=[+(cost*0.6).toFixed(1),+(cost*0.3-l*0.06).toFixed(1),+(cost*0.1-l*0.12).toFixed(1)];
  const sust=y.every(v=>v<=cap)&&cost<=cap;
  return {units,cover,gapLeft,hh,cost,cap,over:cost>cap,y,sust};
}
function fisUpd(){
  const f=fis();const $i=id=>document.getElementById(id);if(!$i("fres"))return;
  if($i("fv1"))$i("fv1").textContent=FIS.invest.toFixed(1);if($i("fv2"))$i("fv2").textContent=FIS.loan.toFixed(1);if($i("fv3"))$i("fv3").textContent=FIS.sub+"%";
  $i("fres").innerHTML=`
    <div class="fbox"><div class="l">新增 Seg A 供给</div><div class="b" style="color:var(--green)">+${n0(f.units)}</div></div>
    <div class="fbox"><div class="l">覆盖率(原 35%)</div><div class="b">${f.cover}%</div></div>
    <div class="fbox"><div class="l">按揭受益家庭</div><div class="b">${n0(f.hh)}</div></div>
    <div class="fbox"><div class="l">当年财政投放</div><div class="b" style="color:${f.over?'var(--crit)':'var(--green)'}">${f.cost} <span style="font-size:12px;font-weight:600">/ ${f.cap} 上限</span></div></div>`;
  $i("fcont").innerHTML=`<b>财政延续性(3 年净投放,SAR B):</b> Y1 ${f.y[0]} · Y2 ${f.y[1]} · Y3 ${f.y[2]}　|　剩余缺口 <b>${n0(f.gapLeft)} 套</b>　|
    <span class="${f.sust?'capok':'capbad'}">${f.sust?'✓ 可持续(各年均在 5% 上限内)':'⚠ 不可持续 — 需 MoF 战略豁免或下调投资'}</span>`;
}
