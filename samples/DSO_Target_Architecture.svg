<text x="58" y="208" fill="#5b6b62" font-size="12.5">Data Quality Monitor Agent(UC-05):清洗 · 去重 · 跨源一致性 · 断源/异常拦截 —— 不达标不进入分析</text>
<line x1="517" y1="224" x2="517" y2="244" stroke="#5b6b62" stroke-width="1.6" marker-end="url(#ar)"/>

