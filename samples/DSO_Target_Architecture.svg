<rect x="288" y="398" width="222" height="42" rx="8" fill="#f6f6ff" stroke="#9a93e8" stroke-width="1"/>
<text x="399" y="424" fill="#152019" text-anchor="middle">Periodic Reports · UC-07</text>
<rect x="524" y="398" width="222" height="42" rx="8" fill="#f6f6ff" stroke="#9a93e8" stroke-width="1"/>
<text x="635" y="424" fill="#152019" text-anchor="middle">Macro Impact · UC-08</text>
<rect x="760" y="398" width="222" height="42" rx="8" fill="#f6f6ff" stroke="#9a93e8" stroke-width="1"/>
<text x="871" y="424" fill="#152019" text-anchor="middle">Knowledge Mgmt · UC-10</text>
</g>
<line x1="517" y1="464" x2="517" y2="484" stroke="#5b6b62" stroke-width="1.6" marker-end="url(#ar)"/>

<rect x="40" y="484" width="955" height="92" rx="10" fill="#fbf3e4" stroke="#b9770e" stroke-width="1.5"/>
<text x="58" y="510" fill="#152019" font-weight="700" font-size="15">L4 · 人工复核与治理门 —— AI 推荐 → 阈值触发暂停 → 人工批准(最小权限 · 三权分离)</text>
<g font-size="12">
<rect x="58" y="524" width="168" height="36" rx="18" fill="#ffffff" stroke="#b9770e"/><text x="142" y="547" fill="#152019" text-anchor="middle">置信 &lt; 70%</text>
<rect x="238" y="524" width="168" height="36" rx="18" fill="#ffffff" stroke="#b9770e"/><text x="322" y="547" fill="#152019" text-anchor="middle">缺口 &gt; 30%</text>
<rect x="418" y="524" width="168" height="36" rx="18" fill="#ffffff" stroke="#b9770e"/><text x="502" y="547" fill="#152019" text-anchor="middle">吸纳骤降 &gt; 40%</text>
<rect x="598" y="524" width="168" height="36" rx="18" fill="#ffffff" stroke="#b9770e"/><text x="682" y="547" fill="#152019" text-anchor="middle">偏差 &gt; 25%</text>
<rect x="778" y="524" width="204" height="36" rx="18" fill="#ffffff" stroke="#b9770e"/><text x="880" y="547" fill="#152019" text-anchor="middle">断源 &gt; 24h → Data Mgr</text>
</g>
<line x1="517" y1="576" x2="517" y2="596" stroke="#5b6b62" stroke-width="1.6" marker-end="url(#ar)"/>

<rect x="40" y="596" width="955" height="84" rx="10" fill="#eaf5ef" stroke="#1B8354" stroke-width="1.4"/>
<text x="58" y="622" fill="#152019" font-weight="700" font-size="15">L5 · 产出与分发</text>
<g font-size="12">
<rect x="58" y="634" width="150" height="34" rx="17" fill="#ffffff" stroke="#1B8354"/><text x="133" y="656" fill="#152019" text-anchor="middle">NL 对话回答</text>
<rect x="220" y="634" width="150" height="34" rx="17" fill="#ffffff" stroke="#1B8354"/><text x="295" y="656" fill="#152019" text-anchor="middle">share-ready PDF</text>
<rect x="382" y="634" width="150" height="34" rx="17" fill="#ffffff" stroke="#1B8354"/><text x="457" y="656" fill="#152019" text-anchor="middle">周期报告</text>
<rect x="544" y="634" width="150" height="34" rx="17" fill="#ffffff" stroke="#1B8354"/><text x="619" y="656" fill="#152019" text-anchor="middle">早期预警</text>
<rect x="706" y="634" width="276" height="34" rx="17" fill="#ffffff" stroke="#1B8354"/><text x="844" y="656" fill="#152019" text-anchor="middle">SSOT 接口 → AI_H_03 / CoPilot(AI_H_04)</text>
</g>

<rect x="1010" y="72" width="180" height="608" rx="10" fill="none" stroke="#cdd8d0" stroke-width="1.4" stroke-dasharray="5 4"/>
<text x="1100" y="96" fill="#152019" font-weight="700" font-size="13" text-anchor="middle">横切层</text>
<g font-size="11.5">
<rect x="1022" y="108" width="156" height="120" rx="8" fill="#ffffff" stroke="#cdd8d0"/>
