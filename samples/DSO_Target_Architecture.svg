<text x="635" y="358" fill="#152019" font-weight="700" text-anchor="middle">Strategic Supply Planning</text>
<text x="635" y="374" fill="#5b6b62" text-anchor="middle" font-size="11">UC-04 / UC-09</text>
<rect x="760" y="338" width="222" height="44" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="1.1"/>
<text x="871" y="358" fill="#152019" font-weight="700" text-anchor="middle">Conversion &amp; Absorption</text>
