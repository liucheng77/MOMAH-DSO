<svg viewBox="0 0 1200 910" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'IBM Plex Sans Arabic','Inter',system-ui,sans-serif">
<title>Demand &amp; Supply Optimizer 目标架构</title>
<rect x="0" y="0" width="1200" height="910" fill="#ffffff"/>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L6,3 L0,6 Z" fill="#5b6b62"/>
</marker>
