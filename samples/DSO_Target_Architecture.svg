<text x="40" y="34" fill="#152019" font-weight="700" font-size="22">Demand &amp; Supply Optimizer — 目标架构(方法论驱动重构)</text>
<text x="40" y="56" fill="#5b6b62" font-size="13">一条规范流水线 · AI 推荐人拍板 · 每个产出可解释可审计 · Coverage 横切 · DSO 为需求/供给/缺口/情景的 SSOT</text>

<rect x="40" y="72" width="955" height="68" rx="10" fill="#eaf5ef" stroke="#1B8354" stroke-width="1.4"/>
<text x="58" y="98" fill="#152019" font-weight="700" font-size="15">L1 · 数据底座 / 中央集成层</text>
<text x="58" y="120" fill="#5b6b62" font-size="12.5">11 源汇入可追溯中心层:Sakani · Wafi · Ejari · IDMS · MoF · MOJ · GASTAT · SEC · Private Mkt · Geo …(DS-01~11)</text>
<line x1="517" y1="140" x2="517" y2="160" stroke="#5b6b62" stroke-width="1.6" marker-end="url(#ar)"/>

<rect x="40" y="160" width="955" height="64" rx="10" fill="#eaf5ef" stroke="#1B8354" stroke-width="1.4"/>
