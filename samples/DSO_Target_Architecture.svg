<text x="1100" y="170" fill="#5b6b62" text-anchor="middle">部委 95%</text><text x="1100" y="186" fill="#5b6b62" text-anchor="middle">私有 80%</text><text x="1100" y="202" fill="#5b6b62" text-anchor="middle">全市场</text>
<rect x="1022" y="240" width="156" height="120" rx="8" fill="#ffffff" stroke="#cdd8d0"/>
<text x="1100" y="288" fill="#152019" font-weight="700" text-anchor="middle">可解释</text>
<text x="1100" y="310" fill="#5b6b62" text-anchor="middle">来源 + 置信</text><text x="1100" y="326" fill="#5b6b62" text-anchor="middle">+ 推理理由</text>
<rect x="1022" y="372" width="156" height="120" rx="8" fill="#ffffff" stroke="#cdd8d0"/>
<text x="1100" y="420" fill="#152019" font-weight="700" text-anchor="middle">审计 &amp; 血缘</text>
<text x="1100" y="442" fill="#5b6b62" text-anchor="middle">每次导出/审批</text><text x="1100" y="458" fill="#5b6b62" text-anchor="middle">留痕 + lineage</text>
<rect x="1022" y="504" width="156" height="120" rx="8" fill="#ffffff" stroke="#cdd8d0"/>
<text x="1100" y="552" fill="#152019" font-weight="700" text-anchor="middle">知识闭环</text>
<text x="1100" y="574" fill="#5b6b62" text-anchor="middle">UC-10 沉淀</text><text x="1100" y="590" fill="#5b6b62" text-anchor="middle">+ 主动洞察</text>
</g>

<text x="40" y="712" fill="#152019" font-weight="700" font-size="14">UI 重构 · 每个 persona(分析师 / 规划经理 / 领导)= 工作台 + Flow + Workbench</text>
<g font-size="12">
<rect x="40" y="724" width="370" height="150" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.2"/>
<text x="58" y="750" fill="#152019" font-weight="700" font-size="13.5">① Persona 工作台首页</text>
<text x="58" y="774" fill="#5b6b62">按角色与权限框定整条流水线</text>
<text x="58" y="794" fill="#5b6b62">分析师重查询 · 规划重缺口/计划</text>
<text x="58" y="814" fill="#5b6b62">领导重预警/执行看板</text>
<rect x="430" y="724" width="370" height="150" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.2"/>
<text x="448" y="750" fill="#152019" font-weight="700" font-size="13.5">② Multi-Agent Flow</text>
<text x="448" y="774" fill="#5b6b62">把 L1→L5 流水线显形:</text>
<text x="448" y="794" fill="#5b6b62">数据门 → 质量门 → 路由 → 分析</text>
<text x="448" y="814" fill="#5b6b62">→ 阈值触发暂停待批 → 产出</text>
<rect x="820" y="724" width="370" height="150" rx="10" fill="#ffffff" stroke="#1B8354" stroke-width="1.2"/>
<text x="838" y="750" fill="#152019" font-weight="700" font-size="13.5">③ Analysis Workbench</text>
<text x="838" y="774" fill="#5b6b62">诊断 → 归因 → 量化影响 → 处方</text>
<text x="838" y="794" fill="#5b6b62">(AiRec)+ 可解释/审计抽屉</text>
<text x="838" y="814" fill="#5b6b62">顶部 Coverage 切换实时重算</text>
</g>
</svg>
